<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>HLK-LD6002 数据监测</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050a12;
            color: #c8d6e5;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'PingFang SC', monospace;
            font-size: 12px;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 12px;
            gap: 10px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #0a1120;
            border: 1px solid #162033;
            border-radius: 5px;
        }
        .title {
            font-size: 14px;
            font-weight: 700;
            color: #00e5ff;
        }
        .time {
            font-size: 12px;
            color: #4a6380;
        }
        .row-title {
            font-size: 10px;
            color: #4a6380;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            padding-left: 4px;
        }
        .card-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }
        .card {
            background: #0b1322;
            border: 1px solid #13203a;
            border-radius: 5px;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        .card-name {
            font-size: 9px;
            color: #3a5570;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .card-value {
            font-size: 20px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            line-height: 1.2;
        }
        .card-unit {
            font-size: 10px;
            color: #3a5570;
            margin-top: 4px;
        }
        .card-status {
            font-size: 10px;
            margin-top: 6px;
            padding: 3px 6px;
            border-radius: 3px;
            background: #0c1625;
            color: #7a9ab8;
        }
        .hr { color: #ff4757; }
        .br { color: #00e5ff; }
        .ph { color: #a855f7; }
        .hrr { color: #14b8a6; }
        .cr { color: #f97316; }
        .plv { color: #a855f7; }
        .brv { color: #22d3ee; }
        .slope { color: #facc15; }
        .brel { color: #ec4899; }
        .state-normal { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .state-warning { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .state-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .state-info { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .state-inactive { background: #0c1625; color: #6b7280; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">HLK-LD6002 数据监测</div>
            <div class="time" id="time">--:--:--</div>
        </div>

        <div>
            <div class="row-title">第一排：原始数据</div>
            <div class="card-row">
                <div class="card">
                    <div class="card-name">原始心率</div>
                    <div class="card-value hr" id="raw-hr">--</div>
                    <div class="card-status" id="raw-hr-status">--</div>
                </div>
                <div class="card">
                    <div class="card-name">原始呼吸率</div>
                    <div class="card-value br" id="raw-br">--</div>
                    <div class="card-status" id="raw-br-status">--</div>
                </div>
                <div class="card">
                    <div class="card-name">心率相位</div>
                    <div class="card-value ph" id="raw-hr-phase">--</div>
                    <div class="card-status" id="raw-hr-phase-status">--</div>
                </div>
                <div class="card">
                    <div class="card-name">呼吸相位</div>
                    <div class="card-value ph" id="raw-br-phase">--</div>
                    <div class="card-status" id="raw-br-phase-status">--</div>
                </div>
                <div class="card">
                    <div class="card-name">有人检测</div>
                    <div class="card-value" id="raw-human">--</div>
                    <div class="card-unit">0/1</div>
                </div>
                <div class="card">
                    <div class="card-name">距离</div>
                    <div class="card-value" id="raw-distance">--</div>
                    <div class="card-unit">cm</div>
                </div>
            </div>
        </div>

        <div>
            <div class="row-title">第二排：处理后数据</div>
            <div class="card-row">
                <div class="card">
                    <div class="card-name">信号状态</div>
                    <div class="card-value" id="proc-state">--</div>
                    <div class="card-status" id="proc-state-detail">--</div>
                </div>
                <div class="card">
                    <div class="card-name">处理后心率</div>
                    <div class="card-value hr" id="proc-hr">--</div>
                    <div class="card-unit">bpm</div>
                </div>
                <div class="card">
                    <div class="card-name">处理后呼吸率</div>
                    <div class="card-value br" id="proc-br">--</div>
                    <div class="card-unit">/min</div>
                </div>
                <div class="card">
                    <div class="card-name">处理后心率相位</div>
                    <div class="card-value ph" id="proc-hr-phase">--</div>
                    <div class="card-unit">rad</div>
                </div>
                <div class="card">
                    <div class="card-name">距离有效</div>
                    <div class="card-value" id="proc-dist-valid">--</div>
                    <div class="card-unit">0/1</div>
                </div>
            </div>
        </div>

        <div>
            <div class="row-title">第三排：计算指标</div>
            <div class="card-row">
                <div class="card">
                    <div class="card-name">心率储备</div>
                    <div class="card-value hrr" id="calc-hrr">--</div>
                    <div class="card-unit">%</div>
                    <div class="card-status" id="calc-hrr-label">--</div>
                </div>
                <div class="card">
                    <div class="card-name">心率斜率</div>
                    <div class="card-value slope" id="calc-slope">--</div>
                    <div class="card-unit">bpm/s</div>
                    <div class="card-status" id="calc-slope-label">--</div>
                </div>
                <div class="card">
                    <div class="card-name">心肺频率比</div>
                    <div class="card-value cr" id="calc-cr">--</div>
                    <div class="card-unit">HR/BR</div>
                    <div class="card-status" id="calc-cr-label">--</div>
                </div>
                <div class="card">
                    <div class="card-name">相位锁定值</div>
                    <div class="card-value plv" id="calc-plv">--</div>
                    <div class="card-status" id="calc-plv-label">--</div>
                </div>
                <div class="card">
                    <div class="card-name">呼吸变异性</div>
                    <div class="card-value brv" id="calc-brv">--</div>
                    <div class="card-unit">CV%</div>
                    <div class="card-status" id="calc-brv-label">--</div>
                </div>
                <div class="card">
                    <div class="card-name">呼吸急促度</div>
                    <div class="card-value brel" id="calc-brel">--</div>
                    <div class="card-unit">%</div>
                    <div class="card-status" id="calc-brel-label">--</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function V(el, val, suffix, prec) {
            if (!el) return;
            if (val === null || val === undefined || val === '' || (typeof val === 'number' && isNaN(val))) {
                el.textContent = '--';
                el.style.color = '#3a5570';
            } else {
                if (prec === undefined) prec = 1;
                el.textContent = parseFloat(val).toFixed(prec) + (suffix || '');
            }
        }

        function getStateClass(state) {
            if (state === 'NORMAL') return 'state-normal';
            if (state === 'BR_UNSTABLE' || state === 'HR_UNSTABLE' || state === 'UNSTABLE') return 'state-warning';
            if (state === 'BIG_MOVE' || state === 'NO_TARGET' || state === 'UNLOCKED') return 'state-error';
            if (state === 'THAW') return 'state-info';
            return 'state-inactive';
        }

        function updateDisplay(d) {
            const raw = d.raw || {};
            const rt = d.rt || {};
            const h = d.physiology || {};
            
            V(document.getElementById('raw-hr'), raw.hr, '', 0);
            const rawHrStatus = document.getElementById('raw-hr-status');
            const hrValid = raw.hr_valid;
            rawHrStatus.textContent = hrValid ? '✓ 有效' : '✗ 无效';
            rawHrStatus.className = 'card-status ' + (hrValid ? 'state-normal' : 'state-error');
            
            V(document.getElementById('raw-br'), raw.br, '', 0);
            const rawBrStatus = document.getElementById('raw-br-status');
            const brValid = raw.br_valid;
            rawBrStatus.textContent = brValid ? '✓ 有效' : '✗ 无效';
            rawBrStatus.className = 'card-status ' + (brValid ? 'state-normal' : 'state-error');
            
            V(document.getElementById('raw-hr-phase'), raw.hr_phase, '', 3);
            const rawHrPhaseStatus = document.getElementById('raw-hr-phase-status');
            const phValid = raw.phase_valid;
            rawHrPhaseStatus.textContent = phValid ? '✓ 有效' : '✗ 无效';
            rawHrPhaseStatus.className = 'card-status ' + (phValid ? 'state-normal' : 'state-error');
            
            V(document.getElementById('raw-br-phase'), raw.br_phase, '', 3);
            const rawBrPhaseStatus = document.getElementById('raw-br-phase-status');
            rawBrPhaseStatus.textContent = phValid ? '✓ 有效' : '✗ 无效';
            rawBrPhaseStatus.className = 'card-status ' + (phValid ? 'state-normal' : 'state-error');
            
            document.getElementById('raw-human').textContent = raw.is_human !== undefined ? raw.is_human : '--';
            V(document.getElementById('raw-distance'), raw.distance, '', 2);
            
            const state = raw.signal_state || '--';
            const stateEl = document.getElementById('proc-state');
            stateEl.textContent = state;
            stateEl.className = 'card-value ' + getStateClass(state);
            
            const stateMap = {
                'NORMAL': '● 正常',
                'BR_UNSTABLE': '◐ 呼吸不稳',
                'HR_UNSTABLE': '◐ 心率不稳',
                'THAW': '↻ 恢复中',
                'BIG_MOVE': '✕ 大幅运动',
                'NO_TARGET': '○ 无目标',
                'UNLOCKED': '○ 失锁',
                'INIT': '… 等待数据',
                'UNSTABLE': '⚡ 不稳定'
            };
            document.getElementById('proc-state-detail').textContent = stateMap[state] || state;
            
            V(document.getElementById('proc-hr'), raw.hr, '', 0);
            V(document.getElementById('proc-br'), raw.br, '', 0);
            V(document.getElementById('proc-hr-phase'), raw.hr_phase, '', 3);
            document.getElementById('proc-dist-valid').textContent = raw.distance_valid !== undefined ? raw.distance_valid : '--';
            
            V(document.getElementById('calc-hrr'), h.hrr_pct, '', 1);
            const hrrLabel = document.getElementById('calc-hrr-label');
            if (h.hrr_pct !== null && h.hrr_pct !== undefined && !isNaN(h.hrr_pct)) {
                if (h.hrr_pct < 40) hrrLabel.textContent = '低强度';
                else if (h.hrr_pct <= 60) hrrLabel.textContent = '中强度';
                else hrrLabel.textContent = '高强度';
                hrrLabel.style.color = '';
            } else {
                hrrLabel.textContent = '--';
                hrrLabel.style.color = '#3a5570';
            }
            
            V(document.getElementById('calc-slope'), h.hr_slope, '', 2);
            const slopeLabel = document.getElementById('calc-slope-label');
            if (h.hr_slope !== null && h.hr_slope !== undefined && !isNaN(h.hr_slope)) {
                if (h.hr_slope < -0.5) slopeLabel.textContent = '快速下降';
                else if (h.hr_slope <= 0.5) slopeLabel.textContent = '平稳';
                else if (h.hr_slope <= 2.0) slopeLabel.textContent = '缓慢上升';
                else slopeLabel.textContent = '快速上升';
                slopeLabel.style.color = '';
            } else {
                slopeLabel.textContent = '--';
                slopeLabel.style.color = '#3a5570';
            }
            
            V(document.getElementById('calc-cr'), h.cr_ratio, '', 2);
            const crLabel = document.getElementById('calc-cr-label');
            if (h.cr_ratio !== null && h.cr_ratio !== undefined && !isNaN(h.cr_ratio)) {
                if (h.cr_ratio < 3.5) crLabel.textContent = '偏低';
                else if (h.cr_ratio <= 5.5) crLabel.textContent = '正常';
                else crLabel.textContent = '偏高';
                crLabel.style.color = '';
            } else {
                crLabel.textContent = '--';
                crLabel.style.color = '#3a5570';
            }
            
            V(document.getElementById('calc-plv'), h.plv_r, '', 3);
            const plvLabel = document.getElementById('calc-plv-label');
            if (h.plv_r !== null && h.plv_r !== undefined && !isNaN(h.plv_r)) {
                if (h.plv_r < 0.3) plvLabel.textContent = '清醒焦虑';
                else if (h.plv_r <= 0.6) plvLabel.textContent = '日常活动';
                else plvLabel.textContent = '深度放松';
                plvLabel.style.color = '';
            } else {
                plvLabel.textContent = '--';
                plvLabel.style.color = '#3a5570';
            }
            
            V(document.getElementById('calc-brv'), h.brv_cv, '', 2);
            const brvLabel = document.getElementById('calc-brv-label');
            if (h.brv_cv !== null && h.brv_cv !== undefined && !isNaN(h.brv_cv)) {
                if (h.brv_cv < 5) brvLabel.textContent = '规律';
                else if (h.brv_cv <= 15) brvLabel.textContent = '正常';
                else brvLabel.textContent = '不规律';
                brvLabel.style.color = '';
            } else {
                brvLabel.textContent = '--';
                brvLabel.style.color = '#3a5570';
            }
            
            V(document.getElementById('calc-brel'), h.br_elevation, '', 1);
            const brelLabel = document.getElementById('calc-brel-label');
            if (h.br_elevation !== null && h.br_elevation !== undefined && !isNaN(h.br_elevation)) {
                if (h.br_elevation < -20) brelLabel.textContent = '呼吸过缓';
                else if (h.br_elevation < 0) brelLabel.textContent = '放松';
                else if (h.br_elevation <= 30) brelLabel.textContent = '正常';
                else if (h.br_elevation <= 60) brelLabel.textContent = '急促';
                else brelLabel.textContent = '异常急促';
                brelLabel.style.color = '';
            } else {
                brelLabel.textContent = '--';
                brelLabel.style.color = '#3a5570';
            }
        }

        function updateTime() {
            document.getElementById('time').textContent = new Date().toTimeString().slice(0, 8);
        }

        function fetchData() {
            fetch('/data?age=60&gender=male')
                .then(r => r.json())
                .then(d => updateDisplay(d))
                .catch(e => console.error('Fetch error:', e));
        }

        setInterval(updateTime, 1000);
        updateTime();
        
        setInterval(fetchData, 500);
        fetchData();
    </script>
</body>
</html>
