<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姿态感知情绪识别系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0b0f19;
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            max-width: 1480px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 24px;
        }
        @media (max-width: 1100px) {
            .container { grid-template-columns: 1fr; }
        }

        .video-wrap {
            background: #111827;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #1f2937;
            position: relative;
        }
        .video-wrap img {
            width: 100%;
            height: auto;
            display: block;
            min-height: 480px;
            object-fit: cover;
        }
        .video-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .panel {
            background: #111827;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #1f2937;
            margin-bottom: 20px;
        }
        .panel-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #64748b;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-title::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 16px;
            background: #3b82f6;
            border-radius: 2px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .status-card {
            background: #0b0f19;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            border: 1px solid #1f2937;
            transition: transform 0.2s;
        }
        .status-card:hover { transform: translateY(-2px); }
        .status-card .label {
            font-size: 11px;
            color: #475569;
            margin-bottom: 6px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .status-card .value {
            font-size: 22px;
            font-weight: 800;
        }
        .value.happy { color: #22c55e; }
        .value.sad { color: #ef4444; }
        .value.calm { color: #94a3b8; }
        .value.uncalibrated { color: #f59e0b; }
        .value.noface { color: #64748b; }

        .score-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .score-label {
            width: 50px;
            font-size: 12px;
            font-weight: 700;
            text-align: right;
        }
        .score-bar-wrap {
            flex: 1;
            height: 10px;
            background: #0b0f19;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #1f2937;
        }
        .score-bar {
            height: 100%;
            border-radius: 5px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .score-bar.happy { background: linear-gradient(90deg, #16a34a, #22c55e); }
        .score-bar.sad { background: linear-gradient(90deg, #dc2626, #ef4444); }
        .score-bar.calm { background: linear-gradient(90deg, #475569, #94a3b8); }
        .score-pct {
            width: 42px;
            font-size: 12px;
            font-weight: 700;
            text-align: right;
            color: #cbd5e1;
        }

        .calib-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .calib-btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .calib-btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .calib-btn:active { transform: translateY(0); }
        .calib-btn.active { box-shadow: 0 0 0 3px rgba(255,255,255,0.25); }
        .calib-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn-front { background: linear-gradient(135deg, #2563eb, #3b82f6); }
        .btn-up { background: linear-gradient(135deg, #7c3aed, #8b5cf6); }
        .btn-down { background: linear-gradient(135deg, #d97706, #f59e0b); }
        .btn-side { background: linear-gradient(135deg, #db2777, #ec4899); }

        .calib-progress-wrap {
            margin-top: 14px;
            height: 6px;
            background: #0b0f19;
            border-radius: 3px;
            overflow: hidden;
        }
        .calib-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #4ade80);
            width: 0%;
            transition: width 0.3s;
        }
        .calib-hint {
            font-size: 12px;
            color: #475569;
            margin-top: 8px;
            text-align: center;
        }

        .threshold-group {
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #1f2937;
        }
        .threshold-group:last-child { border-bottom: none; margin-bottom: 0; }
        .threshold-title {
            font-size: 13px;
            font-weight: 700;
            color: #cbd5e1;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .threshold-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .threshold-row label {
            width: 70px;
            font-size: 12px;
            color: #94a3b8;
        }
        .threshold-row input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            background: #0b0f19;
            outline: none;
        }
        .threshold-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            border: 2px solid #1e293b;
        }
        .threshold-row .num {
            width: 36px;
            font-size: 12px;
            font-weight: 700;
            color: #e2e8f0;
            text-align: right;
        }

        .feature-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .feature-name {
            width: 90px;
            font-size: 11px;
            color: #64748b;
            font-weight: 600;
        }
        .feature-bar-wrap {
            flex: 1;
            height: 8px;
            background: #0b0f19;
            border-radius: 4px;
            overflow: hidden;
        }
        .feature-bar-fill {
            height: 100%;
            background: #3b82f6;
            border-radius: 4px;
            transition: width 0.3s;
        }
        .feature-val {
            width: 56px;
            font-size: 11px;
            color: #94a3b8;
            text-align: right;
            font-family: "SF Mono", Monaco, monospace;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #334155;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-wrap">
            <img src="/video_feed" alt="实时视频流" id="videoFeed">
            <div class="video-badge">📷 实时推理流</div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <div class="panel-title">实时状态</div>
                <div class="status-grid">
                    <div class="status-card">
                        <div class="label">姿态</div>
                        <div class="value" id="dispPose" style="color:#60a5fa">-</div>
                    </div>
                    <div class="status-card">
                        <div class="label">情绪</div>
                        <div class="value uncalibrated" id="dispEmo">未校准</div>
                    </div>
                    <div class="status-card">
                        <div class="label">置信度</div>
                        <div class="value" id="dispConf" style="color:#e2e8f0">0.00</div>
                    </div>
                    <div class="status-card">
                        <div class="label">角度 P/Y/R</div>
                        <div class="value" id="dispAngle" style="font-size:13px; color:#94a3b8">0 / 0 / 0</div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">情绪分数</div>
                <div id="scoreList"></div>
            </div>

            <div class="panel">
                <div class="panel-title">分姿态校准</div>
                <p style="font-size:12px; color:#475569; margin-bottom:14px; line-height:1.5;">
                    分别保持<strong>抬头 / 平视 / 低头 / 侧脸</strong>姿态，并保持<strong>平静</strong>表情，点击对应按钮采集基线（约1秒）。
                </p>
                <div class="calib-grid">
                    <button class="calib-btn btn-front" onclick="toggleCalib('front', this)">😶 平视校准</button>
                    <button class="calib-btn btn-up" onclick="toggleCalib('up', this)">😶 抬头校准</button>
                    <button class="calib-btn btn-down" onclick="toggleCalib('down', this)">😶 低头校准</button>
                    <button class="calib-btn btn-side" onclick="toggleCalib('side', this)">😶 侧脸校准</button>
                </div>
                <div class="calib-progress-wrap">
                    <div class="calib-progress-fill" id="calibProgress"></div>
                </div>
                <div class="calib-hint" id="calibHint">点击上方按钮开始校准</div>
            </div>

            <div class="panel">
                <div class="panel-title">阈值调节</div>
                <div id="thresholdPanel"></div>
            </div>

            <div class="panel">
                <div class="panel-title">实时特征</div>
                <div id="featurePanel"></div>
                <div class="footer">数值为相对基线的偏差模式</div>
            </div>
        </div>
    </div>

    <script>
        const poseNames = {front:'平视', up:'抬头', down:'低头', side:'侧脸'};
        const emoNames = {happy:'高兴', sad:'沮丧', calm:'平静', uncalibrated:'未校准', no_face:'未检测到'};
        const emoClasses = {happy:'happy', sad:'sad', calm:'calm', uncalibrated:'uncalibrated', no_face:'noface'};
        const emoColors = {happy:'#22c55e', sad:'#ef4444', calm:'#94a3b8'};

        let calibActive = false;
        let currentCalibPose = null;
        let configRendered = false;

        async function toggleCalib(pose, btn) {
            if (calibActive) {
                await fetch('/api/calibrate/stop', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({pose: currentCalibPose})
                });
                calibActive = false;
                currentCalibPose = null;
                document.querySelectorAll('.calib-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('calibHint').textContent = '校准完成，可继续校准其他姿态';
            } else {
                await fetch('/api/calibrate/start', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({pose})
                });
                calibActive = true;
                currentCalibPose = pose;
                btn.classList.add('active');
                document.getElementById('calibHint').textContent = `正在采集「${poseNames[pose]}」平静基线... 保持不动`;
            }
        }

        function renderThresholds(cfg) {
            if (configRendered) return;
            configRendered = true;
            const container = document.getElementById('thresholdPanel');
            for (const [pose, c] of Object.entries(cfg)) {
                const div = document.createElement('div');
                div.className = 'threshold-group';
                div.innerHTML = `
                    <div class="threshold-title">${poseNames[pose] || pose}</div>
                    <div class="threshold-row">
                        <label>😊 高兴</label>
                        <input type="range" min="0.1" max="2.0" step="0.05" value="${c.happy_thresh || 0.6}"
                               oninput="updateCfg('${pose}','happy_thresh',this.value)">
                        <div class="num" id="num-${pose}-happy">${(c.happy_thresh || 0.6).toFixed(2)}</div>
                    </div>
                    <div class="threshold-row">
                        <label>😢 沮丧</label>
                        <input type="range" min="0.1" max="2.0" step="0.05" value="${c.sad_thresh || 0.6}"
                               oninput="updateCfg('${pose}','sad_thresh',this.value)">
                        <div class="num" id="num-${pose}-sad">${(c.sad_thresh || 0.6).toFixed(2)}</div>
                    </div>
                `;
                container.appendChild(div);
            }
        }

        async function updateCfg(pose, key, val) {
            document.getElementById(`num-${pose}-${key.replace('_thresh','')}`).textContent = parseFloat(val).toFixed(2);
            const payload = {};
            payload[pose] = {[key]: parseFloat(val)};
            await fetch('/api/config', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(payload)
            });
        }

        function renderFeatures(feats) {
            const container = document.getElementById('featurePanel');
            container.innerHTML = '';
            const items = [
                ['eye_open_avg', '眼睛开合度'],
                ['brow_height_avg', '眉毛高度'],
                ['brow_inner_dist', '眉间距离'],
                ['mouth_ar', '嘴部高宽比'],
                ['mouth_corner_lift', '嘴角上扬度']
            ];
            for (const [key, name] of items) {
                const val = feats[key] !== undefined ? feats[key] : 0;
                const pct = Math.min(100, Math.max(0, (val + 0.5) * 50));
                const row = document.createElement('div');
                row.className = 'feature-row';
                row.innerHTML = `
                    <div class="feature-name">${name}</div>
                    <div class="feature-bar-wrap"><div class="feature-bar-fill" style="width:${pct}%"></div></div>
                    <div class="feature-val">${val.toFixed(3)}</div>
                `;
                container.appendChild(row);
            }
        }

        function renderScores(scores) {
            const container = document.getElementById('scoreList');
            container.innerHTML = '';
            if (!scores) return;
            for (const [k, v] of Object.entries(scores)) {
                const pct = Math.round((v || 0) * 100);
                const row = document.createElement('div');
                row.className = 'score-row';
                row.innerHTML = `
                    <div class="score-label" style="color:${emoColors[k]||'#94a3b8'}">${emoNames[k]||k}</div>
                    <div class="score-bar-wrap"><div class="score-bar ${k}" style="width:${pct}%"></div></div>
                    <div class="score-pct">${pct}%</div>
                `;
                container.appendChild(row);
            }
        }

        async function poll() {
            try {
                const res = await fetch('/api/status');
                const s = await res.json();

                document.getElementById('dispPose').textContent = poseNames[s.pose] || s.pose;
                const emoEl = document.getElementById('dispEmo');
                emoEl.textContent = emoNames[s.emotion] || s.emotion;
                emoEl.className = 'value ' + (emoClasses[s.emotion] || 'uncalibrated');

                document.getElementById('dispConf').textContent = (s.confidence || 0).toFixed(2);
                document.getElementById('dispAngle').textContent =
                    `${s.pitch||0} / ${s.yaw||0} / ${s.roll||0}`;

                renderScores(s.scores);
                if (s.features) renderFeatures(s.features);
                if (s.config) renderThresholds(s.config);

                if (s.calibrating) {
                    const pct = Math.min(100, (s.calib_count / 30) * 100);
                    document.getElementById('calibProgress').style.width = pct + '%';
                    document.getElementById('calibHint').textContent =
                        `采集「${poseNames[s.calib_pose]||s.calib_pose}」基线中... ${s.calib_count}/30`;
                } else {
                    document.getElementById('calibProgress').style.width = '0%';
                }
            } catch(e) {
                console.error('poll error', e);
            }
            setTimeout(poll, 150);
        }

        poll();
    </script>
</body>
</html>
