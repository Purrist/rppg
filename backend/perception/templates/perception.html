<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Perception - 综合情绪与生理监测</title>
<script src="/static/chart.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
html,body{width:100%;height:100%;background:#0c1018;color:#c8cee0;overflow:hidden}
.main-container{display:flex;height:100vh;padding:12px;gap:12px}
.left-panel{flex:0 0 70%;display:flex;flex-direction:column;gap:12px}
.right-panel{flex:1;display:flex;flex-direction:column;gap:12px}
.panel-card{background:linear-gradient(135deg,#151c2c,#1a2236);border-radius:12px;border:1px solid #232e44;overflow:hidden;display:flex;flex-direction:column}
.panel-header{padding:10px 16px;background:rgba(0,0,0,0.2);border-bottom:1px solid #232e44;display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:13px;font-weight:600;color:#64ffda;letter-spacing:0.5px}
.panel-body{flex:1;padding:12px;display:flex;flex-direction:column;gap:10px}
.mini-card{background:rgba(0,0,0,0.3);border-radius:8px;padding:10px 12px;border:1px solid #232e44;display:flex;align-items:center;gap:8px}
.mini-card-title{font-size:10px;color:#6b7a94;text-transform:uppercase;letter-spacing:0.5px}
.mini-card-value{font-size:20px;font-weight:700;color:#fff}
.mini-card-value.heart{color:#EA4335}
.mini-card-value.hrr{color:#34A853}
.mini-card-value.slope{color:#4285F4}
.mini-card-sub{font-size:10px;color:#4a5570}
.row-3cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.person-info{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.info-item{background:rgba(0,0,0,0.3);border-radius:8px;padding:8px 10px;border:1px solid #232e44;display:flex;align-items:center;gap:6px}
.info-label{font-size:10px;color:#6b7a94;text-transform:uppercase}
.info-value{font-size:16px;font-weight:600;color:#fff}
.info-conf{font-size:11px;color:#4a5570}
.info-sub{font-size:10px;color:#4a5570;margin-top:2px}
.psychology-layout{display:flex;flex:1;gap:12px;min-height:0}
.psych-left{flex:0 0 45%;display:flex;flex-direction:column;gap:8px;min-height:0;max-height:260px}
.psych-right{flex:1;display:flex;flex-direction:column;gap:8px;min-height:0;max-height:260px}
.video-box{flex:1;background:#050a12;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;border:1px solid #232e44}
.video-box img{max-width:100%;max-height:100%;object-fit:contain}
.emotion-chart-box{height:180px;background:#050a12;border-radius:8px;overflow:hidden;border:1px solid #232e44;padding:8px}
.emotion-chart-box canvas{width:100%!important;height:100%!important}
.status-mini{display:flex;justify-content:space-between;gap:10px}
.status-mini-item{background:rgba(0,0,0,0.3);border-radius:8px;padding:8px;border:1px solid #232e44;flex:1}
.status-mini-label{font-size:10px;color:#6b7a94;text-transform:uppercase;margin-bottom:4px}
.status-mini-value{font-size:14px;font-weight:600;color:#fff}
.emotion-3cards{display:flex;gap:8px}
.emotion-item{flex:1;padding:8px 10px;border-radius:8px;border:1px solid #232e44;display:flex;align-items:center;gap:6px}
.emotion-item.positive{background:rgba(52,168,83,0.15);border-color:#34A853}
.emotion-item.neutral{background:rgba(107,122,148,0.15);border-color:#6b7a94}
.emotion-item.negative{background:rgba(234,67,53,0.15);border-color:#EA4335}
.emotion-item-label{font-size:10px;color:#6b7a94;text-transform:uppercase}
.emotion-item-value{font-size:24px;font-weight:700}
.emotion-item.positive .emotion-item-value{color:#34A853}
.emotion-item.neutral .emotion-item-value{color:#6b7a94}
.emotion-item.negative .emotion-item-value{color:#EA4335}
.psych-bottom{display:flex;gap:10px;height:80px}
.gate-button{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 20px;background:rgba(0,0,0,0.3);border:1px solid #374151;border-radius:10px;color:#6b7a94;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s ease}
.gate-button:hover{background:rgba(55,65,81,0.5);border-color:#4b5563}
.gate-button.disabled{background:rgba(0,0,0,0.2);border-color:#1f2937;color:#374151}
.gate-label{font-size:11px;color:#6b7a94;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.gate-status{display:flex;align-items:center;gap:6px}
.gate-dot{width:10px;height:10px;border-radius:50%}
.gate-dot-on{background:#34A853;box-shadow:0 0 8px rgba(52,168,83,0.5)}
.gate-dot-off{background:#4b5563}
.gate-status-text{font-size:12px;color:#6b7a94}
.gate-button.disabled .gate-status-text{color:#374151}
.emotion-card{flex:1;background:linear-gradient(135deg,#1a1f35,#252b42);border-radius:10px;border:1px solid #3b82f6;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.emotion-card-label{font-size:10px;color:#6b7a94;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.emotion-card-value{font-size:24px;font-weight:700;color:#fff}
.emotion-card.positive{border-color:#34A853;background:linear-gradient(135deg,rgba(52,168,83,0.15),rgba(52,168,83,0.05))}
.emotion-card.positive .emotion-card-value{color:#34A853}
.emotion-card.negative{border-color:#EA4335;background:linear-gradient(135deg,rgba(234,67,53,0.15),rgba(234,67,53,0.05))}
.emotion-card.negative .emotion-card-value{color:#EA4335}
.emotion-card.neutral{border-color:#6b7a94;background:linear-gradient(135deg,rgba(107,122,148,0.15),rgba(107,122,148,0.05))}
.emotion-card.neutral .emotion-card-value{color:#6b7a94}
.emotion-display{font-size:18px;font-weight:600;padding:6px 14px;border-radius:6px}
.emotion-display.positive{background:rgba(52,168,83,0.2);color:#34A853}
.emotion-display.negative{background:rgba(234,67,53,0.2);color:#EA4335}
.emotion-display.neutral{background:rgba(107,122,148,0.2);color:#6b7a94}
.chart-mini{height:80px;min-height:0;background:#050a12;border-radius:6px;border:1px solid #232e44}
.chart-mini canvas{width:100%!important;height:100%!important}
.cognitive-panel{flex:1;display:flex;align-items:center;justify-content:center;border:1px dashed #232e44}
.cognitive-placeholder{color:#4a5570;font-size:13px}
.dda-panel{flex:1;display:flex;align-items:center;justify-content:center;border:1px dashed #232e44}
.dda-placeholder{color:#4a5570;font-size:13px}
.status-bar{display:flex;align-items:center;gap:16px;padding:8px 12px;background:rgba(0,0,0,0.3);border-radius:8px;font-size:11px;color:#6b7a94}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.status-dot.on{background:#34A853}
.status-dot.off{background:#555}
</style>
</head>
<body>
<div class="main-container">
  <div class="left-panel">
    <!-- 生理卡片 -->
    <div class="panel-card" style="flex:0 0 auto">
      <div class="panel-header">
        <span class="panel-title">生理监测</span>
        <div class="status-bar">
          <span><span class="status-dot" id="comStatus"></span> 心率呼吸率</span>
          <span>最后更新: <span id="lastUpdate">--</span></span>
        </div>
      </div>
      <div class="panel-body">
        <div class="row-3cards">
          <div class="mini-card">
            <span class="mini-card-title">心率</span>
            <span class="mini-card-value heart"><span id="vHeart">--</span> <span style="font-size:12px">bpm</span></span>
            <span class="mini-card-sub"><span id="vHRValid">--</span></span>
          </div>
          <div class="mini-card">
            <span class="mini-card-title">HRR</span>
            <span class="mini-card-value hrr"><span id="vHRR">--</span><span style="font-size:12px">%</span></span>
            <span class="mini-card-sub"><span id="vHRRStatus">储备</span></span>
          </div>
          <div class="mini-card">
            <span class="mini-card-title">斜率</span>
            <span class="mini-card-value slope" id="vHRSlope">--</span>
            <span class="mini-card-sub"><span id="vHRSlopeStatus">趋势</span></span>
          </div>
        </div>
        <div class="person-info">
          <div class="info-item">
            <div class="info-label">是否有人</div>
            <div class="info-value" id="vHuman">--</div>
          </div>
          <div class="info-item">
            <span class="info-label">性别</span>
            <span class="info-value" id="vGender">--</span>
            <span class="info-conf" id="vGenderConf">--%</span>
          </div>
          <div class="info-item">
            <span class="info-label">年龄</span>
            <span class="info-value" id="vAge">--</span>
            <span class="info-conf" id="vAgeConf">--%</span>
          </div>
          <div class="info-item">
            <span class="info-label">身份</span>
            <span class="info-value" id="vUserName">--</span>
            <span class="info-conf" id="vUserConf">--%</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 心理卡片 -->
    <div class="panel-card" style="flex:1">
      <div class="panel-header">
        <span class="panel-title">心理监测</span>
        <div class="status-bar">
          <span><span class="status-dot" id="auStatus"></span> AU情绪</span>
        </div>
      </div>
      <div class="panel-body" style="flex:1">
        <div class="psychology-layout">
          <div class="psych-left">
            <div class="emotion-chart-box">
              <canvas id="mainEmotionChart"></canvas>
            </div>
          </div>
          <div class="psych-right">
            <div class="emotion-3cards">
              <div class="emotion-item positive">
                <span class="emotion-item-label">积极</span>
                <span class="emotion-item-value" id="vPositive">0%</span>
              </div>
              <div class="emotion-item neutral">
                <span class="emotion-item-label">中性</span>
                <span class="emotion-item-value" id="vNeutral">0%</span>
              </div>
              <div class="emotion-item negative">
                <span class="emotion-item-label">消极</span>
                <span class="emotion-item-value" id="vNegative">0%</span>
              </div>
            </div>
            <div class="psych-bottom">
              <button class="gate-button" id="gateButton" onclick="toggleGate()">
                <div class="gate-label">情绪势场</div>
                <div class="gate-status">
                  <span class="gate-dot gate-dot-on"></span>
                  <span class="gate-status-text">已开启</span>
                </div>
              </button>
              <div class="emotion-card" id="emotionCard">
                <div class="emotion-card-label">情绪状态</div>
                <div class="emotion-card-value" id="emotionLabel">中性</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 认知卡片 -->
    <div class="panel-card cognitive-panel">
      <span class="cognitive-placeholder">认知监测 - 待开发</span>
    </div>
  </div>

  <div class="right-panel">
    <!-- DDA难度调整中枢 -->
    <div class="panel-card" style="flex:1">
      <div class="panel-header">
        <span class="panel-title">DDA难度调整中枢</span>
      </div>
      <div class="panel-body dda-panel">
        <span class="dda-placeholder">待开发</span>
      </div>
    </div>
  </div>
</div>

<script>
let mainEmotionChart = null;
let emotionHistory = [];

function initChart() {
    const ctx = document.getElementById('mainEmotionChart');
    if (!ctx) return;
    
    mainEmotionChart = new Chart(ctx.getContext('2d'), {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: '情绪值',
                data: [],
                borderColor: '#4285F4',
                backgroundColor: 'rgba(66,133,244,0.1)',
                fill: true,
                tension: 0.3,
                borderWidth: 2,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 0 },
            scales: {
                x: { display: false, type: 'linear' },
                y: { min: -1.2, max: 1.2, ticks: { display: false }, grid: { color: '#1a2236' } }
            },
            plugins: { legend: { display: false } }
        }
    });
}

function updatePhysioDisplay(data) {
    const physio = data.physio || {};
    
    const vHeart = document.getElementById('vHeart');
    const vHRR = document.getElementById('vHRR');
    const vHRRStatus = document.getElementById('vHRRStatus');
    const vHRSlope = document.getElementById('vHRSlope');
    const vHRSlopeStatus = document.getElementById('vHRSlopeStatus');
    const vHRValid = document.getElementById('vHRValid');
    const comStatus = document.getElementById('comStatus');
    
    if (vHeart) vHeart.textContent = physio.heart || '--';
    
    const hrr = physio.hrr_pct || 0;
    if (vHRR) vHRR.textContent = hrr.toFixed(1);
    
    let hrrStatus = '储备';
    if (hrr < 20) hrrStatus = '低强度';
    else if (hrr < 40) hrrStatus = '中等强度';
    else if (hrr < 60) hrrStatus = '高强度';
    else hrrStatus = '极限强度';
    if (vHRRStatus) vHRRStatus.textContent = hrrStatus;
    
    const hrSlope = physio.hr_slope || 0;
    if (vHRSlope) {
        vHRSlope.textContent = hrSlope.toFixed(2);
        
        let slopeStatus = '趋势';
        if (hrSlope > 1.0) {
            vHRSlope.style.color = '#EA4335';
            slopeStatus = '快速上升';
        } else if (hrSlope > 0.3) {
            vHRSlope.style.color = '#f59e0b';
            slopeStatus = '缓慢上升';
        } else if (hrSlope < -1.0) {
            vHRSlope.style.color = '#34A853';
            slopeStatus = '快速下降';
        } else if (hrSlope < -0.3) {
            vHRSlope.style.color = '#60a5fa';
            slopeStatus = '缓慢下降';
        } else {
            vHRSlope.style.color = '#4285F4';
            slopeStatus = '稳定';
        }
        if (vHRSlopeStatus) vHRSlopeStatus.textContent = slopeStatus;
    }
    
    const hrValid = physio.hr_valid;
    if (vHRValid) {
        vHRValid.textContent = hrValid ? 'HR信号: 正常' : 'HR信号: 异常';
        vHRValid.style.color = hrValid ? '#34A853' : '#EA4335';
    }
    
    if (comStatus) comStatus.className = 'status-dot on';
}



function updatePersonDisplay(data) {
    const faceCount = data.face_count !== undefined ? data.face_count : 0;
    let humanText = '--';
    if (faceCount === 0) {
        humanText = '无人';
    } else if (faceCount === 1) {
        humanText = '1人';
    } else {
        humanText = faceCount + '人';
    }
    
    const vHuman = document.getElementById('vHuman');
    const vGender = document.getElementById('vGender');
    const vGenderConf = document.getElementById('vGenderConf');
    const vAge = document.getElementById('vAge');
    const vAgeConf = document.getElementById('vAgeConf');
    const vUserName = document.getElementById('vUserName');
    const vUserConf = document.getElementById('vUserConf');
    
    if (vHuman) vHuman.textContent = humanText;
    
    const gender = data.gender || '--';
    const genderConf = data.gender_confidence;
    const genderText = gender.toLowerCase() === 'man' ? '男' : gender.toLowerCase() === 'woman' ? '女' : gender;
    if (vGender) vGender.textContent = genderText;
    if (vGenderConf) vGenderConf.textContent = genderConf !== undefined ? (genderConf * 100).toFixed(0) + '%' : '--%';
    
    const age = data.age_range || '--';
    const ageConf = data.age_confidence;
    if (vAge) vAge.textContent = age;
    if (vAgeConf) vAgeConf.textContent = ageConf !== undefined ? (ageConf * 100).toFixed(0) + '%' : '--%';
    
    const userName = data.user_name || '--';
    const userConf = data.user_confidence;
    if (vUserName) vUserName.textContent = userName;
    if (vUserConf) vUserConf.textContent = userConf !== undefined ? (userConf * 100).toFixed(0) + '%' : '--%';
}

function updateEmotionDisplay(data) {
    const emo = data.emotion || {};
    const proc = data.processed || {};
    
    const vPositive = document.getElementById('vPositive');
    const vNeutral = document.getElementById('vNeutral');
    const vNegative = document.getElementById('vNegative');
    const labelEl = document.getElementById('emotionLabel');
    const cardEl = document.getElementById('emotionCard');
    const auStatus = document.getElementById('auStatus');
    
    if (vPositive) vPositive.textContent = Math.round((emo.positive || 0) * 100) + '%';
    if (vNeutral) vNeutral.textContent = Math.round((emo.neutral || 0) * 100) + '%';
    if (vNegative) vNegative.textContent = Math.round((emo.negative || 0) * 100) + '%';
    
    if (labelEl && cardEl) {
        const label = proc.label || 'neutral';
        const specialStates = ['no_face', 'out_of_range', 'speaking', 'uncalibrated'];
        if (specialStates.includes(label)) {
            labelEl.textContent = '中性';
            cardEl.className = 'emotion-card neutral';
        } else {
            const emotionType = label.startsWith('positive') ? 'positive' : label.startsWith('negative') ? 'negative' : 'neutral';
            labelEl.textContent = emotionType === 'positive' ? '积极' : emotionType === 'negative' ? '消极' : '中性';
            cardEl.className = 'emotion-card ' + emotionType;
        }
    }
    
    const value = proc.value || 0;
    emotionHistory.push(value);
    if (emotionHistory.length > 200) emotionHistory.shift();
    
    if (mainEmotionChart) {
        mainEmotionChart.data.datasets[0].data = emotionHistory;
        mainEmotionChart.data.labels = Array.from({length: emotionHistory.length}, (_, i) => i);
        mainEmotionChart.update('none');
    }
    
    if (auStatus) auStatus.className = 'status-dot on';
}

function updateTimestamp() {
    const lastUpdate = document.getElementById('lastUpdate');
    if (lastUpdate) lastUpdate.textContent = new Date().toLocaleTimeString();
}

async function fetchData() {
    try {
        const resp = await fetch('/api/current');
        const data = await resp.json();
        
        if (data.physio) updatePhysioDisplay(data);
        if (data.emotion || data.processed) updateEmotionDisplay(data);
        
        updateTimestamp();
    } catch (e) {
        console.error('API Error', e);
        const comStatus = document.getElementById('comStatus');
        const auStatus = document.getElementById('auStatus');
        if (comStatus) comStatus.className = 'status-dot off';
        if (auStatus) auStatus.className = 'status-dot off';
    }
}

async function fetchPersonData() {
    try {
        const resp = await fetch('/api/data');
        const data = await resp.json();
        updatePersonDisplay(data);
    } catch (e) {
        console.error('Person API Error', e);
    }
}

let gateEnabled = true;

function toggleGate() {
    gateEnabled = !gateEnabled;
    const btn = document.getElementById('gateButton');
    if (!btn) return;
    
    const dot = btn.querySelector('.gate-dot');
    const statusText = btn.querySelector('.gate-status-text');
    if (!dot || !statusText) return;
    
    if (gateEnabled) {
        btn.classList.remove('disabled');
        dot.classList.remove('gate-dot-off');
        dot.classList.add('gate-dot-on');
        statusText.textContent = '已开启';
    } else {
        btn.classList.add('disabled');
        dot.classList.remove('gate-dot-on');
        dot.classList.add('gate-dot-off');
        statusText.textContent = '已关闭';
    }
    
    fetch('/api/gate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled: gateEnabled })
    }).catch(e => console.error('Failed to update gate', e));
}

function initApp() {
    initChart();
    fetchData();
    fetchPersonData();
    setInterval(fetchData, 200);
    setInterval(fetchPersonData, 1000);
}

document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
