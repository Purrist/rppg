<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Perception - 综合情绪与生理监测</title>
<script src="/static/chart.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
html,body{width:100%;height:100%;background:#0c1018;color:#c8cee0;overflow:hidden}
.wrapper{display:grid;grid-template-rows:auto 1fr 1fr;height:100vh;gap:10px;padding:14px 16px}
.header{display:flex;align-items:center;justify-content:space-between}
.cards{display:grid;grid-template-columns:repeat(8,1fr);gap:10px}
.card{background:linear-gradient(135deg,#151c2c,#1a2236);border-radius:10px;padding:14px 18px;position:relative;overflow:hidden;border:1px solid #232e44}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.card.positive::before{background:#34A853}.card.negative::before{background:#EA4335}
.card.neutral::before{background:#6b7a94}.card.physio::before{background:#4285F4}
.card.high-eng::before{background:#34A853}.card.low-eng::before{background:#FBBC05}.card.no-eng::before{background:#6b7a94}
.card.person::before{background:#a855f7}
.card .label{font-size:12px;color:#6b7a94;margin-bottom:6px;letter-spacing:.5px}
.card .val{font-size:24px;font-weight:700;line-height:1.1}
.card .sub{font-size:11px;color:#4a5570;margin-top:4px}
.gate-toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:#6b7a94}
.gate-toggle input{width:18px;height:18px;cursor:pointer}
.charts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;min-height:0}
.chart-panel{background:#111827;border-radius:10px;border:1px solid #1e2a3e;display:flex;flex-direction:column;overflow:hidden}
.chart-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid #1a2438;flex-shrink:0}
.chart-title{font-size:12px;color:#6b7a94;font-weight:600;letter-spacing:.3px}
.chart-body{flex:1;position:relative;min-height:0;padding:4px 8px 8px}
.chart-body canvas{width:100%!important;height:100%!important}
.video-panel{background:#111827;border-radius:10px;border:1px solid #1e2a3e;display:flex;flex-direction:column;overflow:hidden}
.video-body{flex:1;display:flex;align-items:center;justify-content:center;background:#050a12;overflow:hidden}
.video-body img{max-width:100%;max-height:100%;object-fit:contain}
.status-bar{display:flex;align-items:center;gap:20px;padding:8px 14px;background:#151c2c;border-radius:8px;border:1px solid #232e44;font-size:12px;color:#6b7a94}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-dot.on{background:#34A853;box-shadow:0 0 6px rgba(52,168,83,.6)}
.status-dot.off{background:#555}
.emotion-display{font-size:16px;font-weight:600;padding:4px 12px;border-radius:6px}
.emotion-display.positive{background:rgba(52,168,83,.2);color:#34A853}
.emotion-display.negative{background:rgba(234,67,53,.2);color:#EA4335}
.emotion-display.neutral{background:rgba(107,122,148,.2);color:#6b7a94}
.confidence-bar{width:100%;height:6px;background:#1a2236;border-radius:3px;overflow:hidden;margin-top:6px}
.confidence-fill{height:100%;border-radius:3px;transition:width .3s}
.confidence-fill.high{background:#34A853}.confidence-fill.medium{background:#FBBC05}.confidence-fill.low{background:#EA4335}
.person-details{display:flex;flex-direction:column;height:100%}
.person-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px}
.person-bar{width:100%;height:8px;background:#050a12;border-radius:4px;margin-top:10px;overflow:hidden}
.person-bar-fill{height:100%;transition:width 0.3s ease}
.person-bar-age{background:linear-gradient(90deg,#f97316,#fb923c)}
.person-bar-gender{background:linear-gradient(90deg,#00e5ff,#06b6d4)}
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="cards">
      <div class="card positive">
        <div class="label">积极</div>
        <div class="val" id="vPositive">0%</div>
        <div class="sub" id="vPositiveRaw">原始: 0%</div>
      </div>
      <div class="card neutral">
        <div class="label">中性</div>
        <div class="val" id="vNeutral">0%</div>
        <div class="sub" id="vNeutralRaw">原始: 0%</div>
      </div>
      <div class="card negative">
        <div class="label">消极</div>
        <div class="val" id="vNegative">0%</div>
        <div class="sub" id="vNegativeRaw">原始: 0%</div>
      </div>
      <div class="card physio">
        <div class="label">心率</div>
        <div class="val"><span id="vHeart">-</span> <span style="font-size:14px">bpm</span></div>
        <div class="sub" id="vHumanStatus">等待</div>
      </div>
      <div class="card physio">
        <div class="label">呼吸率</div>
        <div class="val"><span id="vBreath">-</span> <span style="font-size:14px">bpm</span></div>
        <div class="sub" id="vTimestamp">-</div>
      </div>
      <div class="card neutral">
        <div class="label">专注度</div>
        <div class="val" id="vEngagement">-</div>
        <div class="sub" id="vEngagementStatus">无数据</div>
      </div>
      <div class="card person">
        <div class="label">性别</div>
        <div class="val" id="vGender">--</div>
        <div class="sub" id="vGenderConf">置信度: --%</div>
      </div>
      <div class="card person">
        <div class="label">年龄</div>
        <div class="val" id="vAge">--</div>
        <div class="sub" id="vAgeConf">置信度: --%</div>
      </div>
    </div>
    <div class="gate-toggle">
      <input type="checkbox" id="gateEnabled" checked>
      <label for="gateEnabled">启用情绪势场</label>
    </div>
  </div>

  <div class="charts-row">
    <div class="video-panel">
      <div class="chart-header"><span class="chart-title">视频流</span></div>
      <div class="video-body">
        <img src="http://127.0.0.1:5010/video_feed" alt="视频流" id="videoFeed">
      </div>
    </div>
    <div class="chart-panel">
      <div class="chart-header"><span class="chart-title">情绪曲线 (+1 / +0.5 / 0 / -0.5 / -1)</span></div>
      <div class="chart-body"><canvas id="emotionChart"></canvas></div>
    </div>
    <div class="chart-panel">
      <div class="chart-header"><span class="chart-title">处理后情绪分类</span></div>
      <div class="chart-body">
        <div id="processedEmotion" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px">
          <div class="emotion-display neutral" id="emotionLabel" style="font-size:28px">中性</div>
          <div style="text-align:center">
            <div style="font-size:14px;color:#6b7a94">信度</div>
            <div class="confidence-bar" style="width:200px">
              <div class="confidence-fill medium" id="confidenceFill" style="width:50%"></div>
            </div>
            <div style="font-size:12px;color:#4a5570;margin-top:4px" id="confidenceText">50%</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-panel">
      <div class="chart-header"><span class="chart-title">心率波形</span></div>
      <div class="chart-body"><canvas id="heartChart"></canvas></div>
    </div>
    <div class="chart-panel">
      <div class="chart-header"><span class="chart-title">呼吸率波形</span></div>
      <div class="chart-body"><canvas id="breathChart"></canvas></div>
    </div>
    <div class="chart-panel">
      <div class="chart-header"><span class="chart-title">人脸分析详情</span></div>
      <div class="chart-body" style="padding:14px">
        <div class="person-details">
          <div class="person-row">
            <span>人脸检测</span>
            <span id="personFaceStatus">--</span>
          </div>
          <div class="person-row">
            <span>检测到人脸数</span>
            <span id="personFaceCount">--</span>
          </div>
          <div style="margin-top:15px">
            <div class="person-row">
              <span>性别</span>
              <span id="personGender">--</span>
            </div>
            <div class="person-bar">
              <div class="person-bar-fill person-bar-gender" id="personGenderBar" style="width:0%"></div>
            </div>
          </div>
          <div style="margin-top:20px">
            <div class="person-row">
              <span>年龄</span>
              <span id="personAge">--</span>
            </div>
            <div class="person-bar">
              <div class="person-bar-fill person-bar-age" id="personAgeBar" style="width:0%"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span><span class="status-dot" id="auStatus"></span> AU情绪</span>
    <span><span class="status-dot" id="comStatus"></span> 心率呼吸率</span>
    <span><span class="status-dot" id="personStatus"></span> 人脸分析</span>
    <span style="margin-left:auto">最后更新: <span id="lastUpdate">-</span></span>
  </div>
</div>

<script>
const EMOTION_COLORS = {
    'positive_high': '#34A853',
    'positive_low': '#81C784',
    'neutral': '#6b7a94',
    'neutral_high': '#94A3B8',
    'negative_low': '#E57373',
    'negative_high': '#EA4335'
};

const LABEL_CN = {
    'positive_high': '积极 高信度',
    'positive_low': '积极 低信度',
    'neutral': '中性',
    'neutral_high': '中性 高信度',
    'negative_low': '消极 低信度',
    'negative_high': '消极 高信度',
    'no_face': '无人脸',
    'out_of_range': '超出范围',
    'speaking': '说话中',
    'uncalibrated': '未校准'
};

const VALUE_MAP = {
    'positive_high': 1,
    'positive_low': 0.5,
    'neutral': 0,
    'neutral_high': 0,
    'negative_low': -0.5,
    'negative_high': -1
};

const emotionChart = new Chart(document.getElementById('emotionChart'), {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: '情绪值',
            data: [],
            borderColor: '#4285F4',
            backgroundColor: 'rgba(66,133,244,0.1)',
            fill: true,
            tension: 0.3,
            borderWidth: 2,
            pointRadius: 0
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: {
            duration: 0
        },
        scales: {
            x: { 
                display: false,
                type: 'linear'
            },
            y: {
                min: -1.2, max: 1.2,
                ticks: {
                    color: '#3a4a64',
                    stepSize: 0.5,
                    callback: v => v === 1 ? '+1' : v === 0.5 ? '+0.5' : v === 0 ? '0' : v === -0.5 ? '-0.5' : v === -1 ? '-1' : ''
                },
                grid: { color: '#1a2236' }
            }
        },
        plugins: {
            legend: { display: false },
            tooltip: {
                backgroundColor: '#1a2236',
                callbacks: {
                    label: ctx => `情绪值: ${ctx.parsed.y > 0 ? '+' : ''}${ctx.parsed.y.toFixed(2)}`
                }
            }
        }
    }
});

const heartChart = new Chart(document.getElementById('heartChart'), {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: '心率',
            data: [],
            borderColor: '#EA4335',
            backgroundColor: 'rgba(234,67,53,0.1)',
            fill: true,
            tension: 0.3,
            borderWidth: 1.5,
            pointRadius: 0
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: {
            duration: 0
        },
        scales: {
            x: { 
                display: false,
                type: 'linear'
            },
            y: { min: 40, max: 120, grid: { color: '#1a2236' }, ticks: { color: '#3a4a64' } }
        },
        plugins: { legend: { display: false } }
    }
});

const breathChart = new Chart(document.getElementById('breathChart'), {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: '呼吸率',
            data: [],
            borderColor: '#4285F4',
            backgroundColor: 'rgba(66,133,244,0.1)',
            fill: true,
            tension: 0.3,
            borderWidth: 1.5,
            pointRadius: 0
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: {
            duration: 0
        },
        scales: {
            x: { 
                display: false,
                type: 'linear'
            },
            y: { min: 0, max: 40, grid: { color: '#1a2236' }, ticks: { color: '#3a4a64' } }
        },
        plugins: { legend: { display: false } }
    }
});

let emotionHistory = [];
let heartHistory = [];
let breathHistory = [];
let lastAUData = null;
let lastComData = null;

function updateEmotionDisplay(data) {
    const emo = data.emotion || {};
    const proc = data.processed || {};

    document.getElementById('vPositive').textContent = Math.round((emo.positive || 0) * 100) + '%';
    document.getElementById('vNeutral').textContent = Math.round((emo.neutral || 0) * 100) + '%';
    document.getElementById('vNegative').textContent = Math.round((emo.negative || 0) * 100) + '%';
    
    // 更新专注度显示
    const engagement = emo.engagement || 'None';
    const engLabel = document.getElementById('vEngagement');
    const engStatus = document.getElementById('vEngagementStatus');
    const engCard = engLabel.closest('.card');
    
    const ENG_LABELS = {
        'High': '高专注',
        'Low': '低专注',
        'None': '无专注'
    };
    
    const ENG_STATUS = {
        'High': '正在低头',
        'Low': '部分低头',
        'None': '没有低头'
    };
    
    engLabel.textContent = ENG_LABELS[engagement] || '无专注';
    engStatus.textContent = ENG_STATUS[engagement] || '无数据';
    
    // 更新卡片样式
    engCard.className = 'card';
    if (engagement === 'High') {
        engCard.classList.add('high-eng');
    } else if (engagement === 'Low') {
        engCard.classList.add('low-eng');
    } else {
        engCard.classList.add('no-eng');
    }

    const label = proc.label || 'neutral';
    const confidence = proc.confidence || 0;
    const value = proc.value || 0;

    const labelCn = LABEL_CN[label] || '中性';
    const labelEl = document.getElementById('emotionLabel');
    labelEl.textContent = labelCn;

    const specialStates = ['no_face', 'out_of_range', 'speaking', 'uncalibrated'];
    if (specialStates.includes(label)) {
        labelEl.className = 'emotion-display neutral';
    } else {
        labelEl.className = 'emotion-display ' + (label.startsWith('positive') ? 'positive' : label.startsWith('negative') ? 'negative' : 'neutral');
    }

    const confEl = document.getElementById('confidenceFill');
    confEl.style.width = (confidence * 100) + '%';
    confEl.className = 'confidence-fill ' + (confidence > 0.6 ? 'high' : confidence > 0.3 ? 'medium' : 'low');
    document.getElementById('confidenceText').textContent = Math.round(confidence * 100) + '%';

    emotionHistory.push(value);
    if (emotionHistory.length > 300) emotionHistory.shift();

    emotionChart.data.datasets[0].data = emotionHistory;
    emotionChart.data.labels = Array.from({length: emotionHistory.length}, (_, i) => i);
    emotionChart.update('none');

    document.getElementById('auStatus').className = 'status-dot on';
}

function updatePhysioDisplay(data) {
    const physio = data.physio || {};

    document.getElementById('vHeart').textContent = physio.heart || '-';
    document.getElementById('vBreath').textContent = physio.breath || '-';
    document.getElementById('vHumanStatus').textContent = physio.human ? '有人' : '无人';

    heartHistory.push(physio.heart || 0);
    if (heartHistory.length > 120) heartHistory.shift();
    breathHistory.push(physio.breath || 0);
    if (breathHistory.length > 120) breathHistory.shift();

    heartChart.data.datasets[0].data = heartHistory;
    heartChart.data.labels = Array.from({length: heartHistory.length}, (_, i) => i);
    heartChart.update('none');
    
    breathChart.data.datasets[0].data = breathHistory;
    breathChart.data.labels = Array.from({length: breathHistory.length}, (_, i) => i);
    breathChart.update('none');

    document.getElementById('comStatus').className = 'status-dot on';
}

function updatePersonDisplay(data) {
    document.getElementById('vGender').textContent = data.gender || '--';
    document.getElementById('vGenderConf').textContent = '置信度: ' + (data.gender_confidence * 100).toFixed(1) + '%';
    document.getElementById('vAge').textContent = data.age_range || '--';
    document.getElementById('vAgeConf').textContent = '置信度: ' + (data.age_confidence * 100).toFixed(1) + '%';
    
    document.getElementById('personFaceStatus').textContent = data.face_detected ? '已检测' : '未检测';
    document.getElementById('personFaceStatus').style.color = data.face_detected ? '#10b981' : '#ef4444';
    document.getElementById('personFaceCount').textContent = data.face_count;
    document.getElementById('personGender').textContent = data.gender || '--';
    document.getElementById('personAge').textContent = data.age_range || '--';
    
    document.getElementById('personGenderBar').style.width = (data.gender_confidence * 100) + '%';
    document.getElementById('personAgeBar').style.width = (data.age_confidence * 100) + '%';
    
    document.getElementById('personStatus').className = 'status-dot on';
}

function updateTimestamp() {
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
}

async function fetchData() {
    try {
        const resp = await fetch('/api/current');
        const data = await resp.json();

        if (data.emotion) updateEmotionDisplay(data);
        if (data.physio) updatePhysioDisplay(data);

        updateTimestamp();
    } catch (e) {
        console.error('API Error', e);
        document.getElementById('auStatus').className = 'status-dot off';
        document.getElementById('comStatus').className = 'status-dot off';
    }
}

async function fetchPersonData() {
    try {
        const resp = await fetch('/api/data');
        const data = await resp.json();
        updatePersonDisplay(data);
    } catch (e) {
        console.error('Person API Error', e);
        document.getElementById('personStatus').className = 'status-dot off';
    }
}

document.getElementById('gateEnabled').addEventListener('change', async (e) => {
    try {
        await fetch('/api/gate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ enabled: e.target.checked })
        });
    } catch (e) {
        console.error('Failed to update gate', e);
    }
});

setInterval(fetchData, 200);
setInterval(fetchPersonData, 1000);
fetchData();
fetchPersonData();
</script>
</body>
</html>
