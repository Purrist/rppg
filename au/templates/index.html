<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AU 实时情绪推理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI','Microsoft YaHei',sans-serif;display:flex;height:100vh;overflow:hidden}
.left{width:420px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid #21262d}
.left .feed{flex:1;background:#000;display:flex;align-items:center;justify-content:center;min-height:0}
.left .feed img{width:100%;height:100%;object-fit:contain}
.snap-area{border-top:1px solid #21262d;padding:10px}
.snap-area h3{font-size:12px;color:#8b949e;margin-bottom:6px}
.snap-list{display:flex;gap:6px;overflow:hidden}
.snap-item{width:70px;height:52px;border-radius:4px;overflow:hidden;position:relative;flex-shrink:0;border:2px solid transparent}
.snap-item img{width:100%;height:100%;object-fit:cover}
.snap-item .lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);font-size:9px;text-align:center;padding:1px 0;color:#fff}
.snap-item.happy{border-color:#4ecca3}.snap-item.sad{border-color:#e74c3c}.snap-item.calm{border-color:#8b949e}.snap-item.speaking{border-color:#00c8ff}
.right{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:12px}
h3{font-size:12px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
/* Emotion display */
.emo-big{text-align:center;font-size:26px;font-weight:700;padding:4px 0}
.emo-big.calm{color:#8b949e}.emo-big.happy{color:#4ecca3}.emo-big.sad{color:#e74c3c}
.emo-big.uncalibrated{color:#d29922}.emo-big.out_of_range{color:#e3722b}.emo-big.no_face{color:#f85149}.emo-big.speaking{color:#00c8ff}
.emo-info{display:flex;justify-content:space-between;font-size:12px;color:#8b949e}
/* Score bars */
.bar-row{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:12px}
.bar-row .lbl{width:36px;text-align:right;color:#8b949e}
.bar-row .bar{flex:1;height:14px;background:#0d1117;border-radius:3px;overflow:hidden}
.bar-row .fill{height:100%;border-radius:3px;transition:width .2s}
.bar-row .val{width:34px;font-size:11px;color:#8b949e}
.fill.calm{background:#8b949e}.fill.happy{background:#4ecca3}.fill.sad{background:#e74c3c}
/* Timeline chart */
.chart-wrap{position:relative}
.chart-wrap canvas{width:100%;height:140px;display:block;border-radius:4px;cursor:grab}
.chart-wrap canvas:active{cursor:grabbing}
.chart-live{position:absolute;top:6px;right:6px;font-size:11px;background:#238636;color:#fff;padding:2px 8px;border-radius:10px;cursor:pointer;display:none}
.chart-live.hidden{display:inline-block}
/* Pose & AU info */
.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px 10px;font-size:12px}
.info-grid .k{color:#8b949e}.info-grid .v{color:#c9d1d9;text-align:right}
.au-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;font-size:12px;margin-top:6px}
.au-item{display:flex;justify-content:space-between;padding:1px 0}
.au-name{color:#8b949e}.au-val{color:#4ecca3;font-weight:600;min-width:30px;text-align:right}
/* Calibration matrix */
.calib-table{width:100%;border-collapse:collapse}
.calib-table th,.calib-table td{text-align:center;padding:4px;font-size:12px}
.calib-table th{color:#8b949e;font-weight:normal}
.calib-table td.pose-label{color:#8b949e;text-align:right;padding-right:8px}
.calib-cell{width:56px;height:32px;border:1px solid #30363d;border-radius:4px;background:#0d1117;
  color:#484f58;cursor:pointer;font-size:14px;transition:all .15s}
.calib-cell:hover{border-color:#58a6ff}
.calib-cell.done{background:#1a3a2a;color:#4ecca3;border-color:#2ea043}
.calib-cell.active{background:#1c2d41;color:#58a6ff;border-color:#58a6ff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.calib-status{font-size:12px;margin-top:6px;min-height:16px}
.calib-status.ok{color:#4ecca3}
.calib-status.err{color:#e74c3c}
/* Threshold sliders */
.thresh-group{margin-bottom:6px}
.thresh-group .tg-title{font-size:12px;color:#8b949e;margin-bottom:2px}
.slider-row{display:flex;align-items:center;gap:6px;margin:2px 0;font-size:11px}
.slider-row label{width:40px;color:#8b949e;flex-shrink:0}
.slider-row input[type=range]{flex:1;accent-color:#4ecca3;height:4px}
.slider-row .sv{width:28px;text-align:right;color:#4ecca3;font-variant-numeric:tabular-nums}
</style>
</head>
<body>

<!-- Left: video + snapshots -->
<div class="left">
  <div class="feed"><img src="/video_feed" alt="feed"></div>
  <div class="snap-area">
    <h3>最近情绪变化</h3>
    <div class="snap-list" id="snap-list"></div>
  </div>
</div>

<!-- Right: controls -->
<div class="right">
  <!-- Emotion -->
  <div class="card">
    <div class="emo-big" id="emo-text">未校准</div>
    <div class="emo-info">
      <span id="emo-pose">姿态 -</span>
      <span id="emo-conf">置信度 0.00</span>
    </div>
  </div>

  <!-- Score bars -->
  <div class="card">
    <h3>情绪分数</h3>
    <div class="bar-row"><span class="lbl">平静</span><div class="bar"><div class="fill calm" id="bar-calm" style="width:0%"></div></div><span class="val" id="val-calm">0%</span></div>
    <div class="bar-row"><span class="lbl">高兴</span><div class="bar"><div class="fill happy" id="bar-happy" style="width:0%"></div></div><span class="val" id="val-happy">0%</span></div>
    <div class="bar-row"><span class="lbl">沮丧</span><div class="bar"><div class="fill sad" id="bar-sad" style="width:0%"></div></div><span class="val" id="val-sad">0%</span></div>
  </div>

  <!-- Timeline -->
  <div class="card">
    <h3>情绪时间线（拖动查看，滚轮缩放）</h3>
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
      <div class="chart-live hidden" id="chart-live" onclick="chartLive()">LIVE</div>
    </div>
  </div>

  <!-- Pose & AU -->
  <div class="card">
    <h3>姿态 / 角度</h3>
    <div class="info-grid">
      <span class="k">姿态</span><span class="v" id="v-pose">-</span>
      <span class="k">Pitch</span><span class="v" id="v-pitch">0</span>
      <span class="k">Yaw</span><span class="v" id="v-yaw">0</span>
    </div>
    <h3 style="margin-top:8px">关键 Action Units</h3>
    <div class="au-grid" id="au-grid"></div>
  </div>

  <!-- Calibration 4x3 -->
  <div class="card">
    <h3>校准矩阵（4 姿态 x 3 情绪）</h3>
    <p style="font-size:11px;color:#484f58;margin-bottom:6px">点击单元格 → 保持该姿态+表情 → 等待自动完成（30帧）</p>
    <table class="calib-table" id="calib-table"></table>
    <div class="calib-status" id="calib-status"></div>
  </div>

  <!-- Thresholds per pose -->
  <div class="card">
    <h3>各姿态情绪阈值（值越小越灵敏）</h3>
    <div id="thresh-area"></div>
    <div class="slider-row" style="margin-top:6px">
      <label style="width:60px">角度限制</label>
      <input type="range" min="15" max="45" step="1" id="sl-pitch" oninput="updateCfg()">
      <span class="sv" id="sv-pitch">30°</span>
    </div>
  </div>
</div>

<script>
const AU_SHOW = ['AU12','AU6','AU25','AU7','AU5','AU15','AU4','AU17','AU1','AU9'];
const AU_LABEL = {AU12:'嘴角上拉',AU6:'颧骨提升',AU25:'嘴唇分开',AU7:'眼睑收紧',
  AU5:'上睑抬起',AU15:'嘴角下拉',AU4:'皱眉',AU17:'下巴上提',AU1:'内眉上抬',AU9:'鼻皱'};
const POSES = ['front','up','down','side'];
const EMOS = ['calm','happy','sad'];
const POSE_CN = {front:'平视',up:'抬头',down:'低头',side:'侧脸'};
const EMO_EMOJI={calm:'😐',happy:'😊',sad:'😢',speaking:'🗣',no_face:'❌',uncalibrated:'⏳',out_of_range:'⚠'};
const EMO_CN={calm:'平静',happy:'高兴',sad:'沮丧',speaking:'说话中',no_face:'无人脸',uncalibrated:'未校准',out_of_range:'超出角度'};
const CALIB_GUIDE={calm:'面无表情，自然放松',happy:'嘴角上扬，露出笑容',sad:'皱眉，嘴角微微下拉'};

// ── Init AU grid ──
const auGrid = document.getElementById('au-grid');
AU_SHOW.forEach(k => {
  const d = document.createElement('div'); d.className='au-item';
  d.innerHTML = `<span class="au-name">${AU_LABEL[k]||k}</span><span class="au-val" id="au-${k}">0</span>`;
  auGrid.appendChild(d);
});

// ── Init calibration table ──
function renderCalibTable(calibrated,calibPose,calibEmo,calibCnt){
  let h='<tr><th></th>';
  EMOS.forEach(e=>h+=`<th>${EMO_EMOJI[e]}${EMO_CN[e]}</th>`);
  h+='</tr>';
  POSES.forEach(p=>{
    h+=`<tr><td class="pose-label">${POSE_CN[p]}</td>`;
    EMOS.forEach(e=>{
      const done=calibrated[p]&&calibrated[p].includes(e);
      const active=calibPose===p&&calibEmo===e;
      let cls='calib-cell';
      if(active)cls+=' active';else if(done)cls+=' done';
      const txt=active?calibCnt+'/30':(done?'✓':'—');
      const delBtn=done&&!active
        ?`<button onclick="event.stopPropagation();deleteCalib('${p}','${e}')"
           style="margin-left:2px;background:none;border:none;color:#f85149;cursor:pointer;font-size:12px;padding:0 1px" title="删除">×</button>`
        :'';
      h+=`<td><button class="${cls}" onclick="startCalib('${p}','${e}')"
         title="${POSE_CN[p]} +${CALIB_GUIDE[e]}">${txt}</button>${delBtn}</td>`;
    });
    h+='</tr>';
  });
  h+=`<tr><td colspan="4" style="padding-top:8px;text-align:center">
    <button onclick="deleteAllCalib()"
      style="background:#21262d;border:1px solid #30363d;color:#f85149;padding:4px 14px;border-radius:4px;cursor:pointer;font-size:12px">
      全部重置</button></td></tr>`;
  document.getElementById('calib-table').innerHTML=h;
}
renderCalibTable({}, null, null, 0);

// ── Init threshold sliders ──
function renderThresh(cfg) {
  let h = '';
  POSES.forEach(p => {
    if (!cfg[p]) return;
    h += `<div class="thresh-group"><div class="tg-title">${POSE_CN[p]}</div>`;
    h += `<div class="slider-row"><label>高兴</label><input type="range" min="0.3" max="4" step="0.1"
      value="${cfg[p].h_thresh||1.2}" data-pose="${p}" data-key="h_thresh" oninput="updateCfg()">
      <span class="sv">${(cfg[p].h_thresh||1.2).toFixed(1)}</span></div>`;
    h += `<div class="slider-row"><label>沮丧</label><input type="range" min="0.3" max="4" step="0.1"
      value="${cfg[p].s_thresh||1.2}" data-pose="${p}" data-key="s_thresh" oninput="updateCfg()">
      <span class="sv">${(cfg[p].s_thresh||1.2).toFixed(1)}</span></div>`;
    h += '</div>';
  });
  document.getElementById('thresh-area').innerHTML = h;
}

// ── Timeline chart ──
const chartCanvas = document.getElementById('chart');
const ctx = chartCanvas.getContext('2d');
let chartData = [];
let viewEnd = 0, viewSpan = 30, autoScroll = true;
let dragActive = false, dragX0 = 0, dragVE = 0;

chartCanvas.addEventListener('mousedown', e => {
  dragActive = true; autoScroll = false; dragX0 = e.clientX; dragVE = viewEnd;
  document.getElementById('chart-live').classList.remove('hidden');
});
window.addEventListener('mousemove', e => {
  if (!dragActive) return;
  const dx = e.clientX - dragX0;
  const tpp = viewSpan / chartCanvas.clientWidth;
  viewEnd = dragVE - dx * tpp;
});
window.addEventListener('mouseup', () => { dragActive = false; });
chartCanvas.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY > 0 ? 1.15 : 0.87;
  viewSpan = Math.max(5, Math.min(300, viewSpan * f));
}, {passive:false});

function chartLive() {
  autoScroll = true;
  document.getElementById('chart-live').classList.add('hidden');
}

function drawChart() {
  const dpr = window.devicePixelRatio || 1;
  const cw = chartCanvas.clientWidth, ch = chartCanvas.clientHeight;
  chartCanvas.width = cw * dpr; chartCanvas.height = ch * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, cw, ch);

  const pad = {l:32, r:8, t:18, b:20};
  const pw = cw - pad.l - pad.r, ph = ch - pad.t - pad.b;
  const vs = viewEnd - viewSpan;

  // Grid
  ctx.strokeStyle = '#21262d'; ctx.lineWidth = .5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + ph * i / 4;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + pw, y); ctx.stroke();
  }
  // Time ticks
  const step = viewSpan > 120 ? 30 : viewSpan > 40 ? 10 : viewSpan > 15 ? 5 : 2;
  ctx.fillStyle = '#484f58'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
  const t0 = Math.ceil(vs / step) * step;
  for (let t = t0; t <= viewEnd; t += step) {
    const x = pad.l + (t - vs) / viewSpan * pw;
    if (x < pad.l || x > pad.l + pw) continue;
    ctx.fillText(t + 's', x, ch - 4);
    ctx.beginPath(); ctx.moveTo(x, pad.t); ctx.lineTo(x, pad.t + ph); ctx.stroke();
  }
  // Y labels
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    ctx.fillText((i*25)+'%', pad.l - 3, pad.t + ph*(1-i/4) + 3);
  }

  // Data
  const vis = chartData.filter(d => d.t >= vs - 1 && d.t <= viewEnd + 1);
  if (vis.length < 2) return;

  const colors = {calm:'#8b949e', happy:'#4ecca3', sad:'#e74c3c', speaking:'#00c8ff'};
  for (const emo of EMOS) {
    ctx.strokeStyle = colors[emo]; ctx.lineWidth = 1.5; ctx.beginPath();
    let started = false;
    for (const d of vis) {
      const x = pad.l + (d.t - vs) / viewSpan * pw;
      const y = pad.t + ph * (1 - (d.s[emo] || 0));
      if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Legend
  ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
  let lx = pad.l + 4;
  for (const [e, c] of Object.entries(colors)) {
    ctx.fillStyle = c; ctx.fillRect(lx, pad.t + 2, 10, 3);
    ctx.fillText(EMO_CN[e], lx + 13, pad.t + 8); lx += 50;
  }
}

// ── Calibration ──
function startCalib(pose,emotion){
  fetch('/api/calibrate/start',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pose,emotion})}).then(r=>r.json()).then(d=>{
    if(d.ok){
      document.getElementById('calib-status').textContent=
        `${POSE_CN[pose]} +${CALIB_GUIDE[emotion]}（等待30帧...）`;
      document.getElementById('calib-status').className='calib-status ok';
    }else{
      document.getElementById('calib-status').textContent='❌ 无法启动';
      document.getElementById('calib-status').className='calib-status err';
    }
  });
}

function deleteCalib(pose,emotion){
  if(!confirm(`确认删除 ${POSE_CN[pose]} /${EMO_CN[emotion]} 的校准数据？`))return;
  fetch('/api/calibrate/delete',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pose,emotion})}).then(r=>r.json()).then(d=>{
    if(d.ok){
      document.getElementById('calib-status').textContent=`已删除 ${POSE_CN[pose]}/${EMO_CN[emotion]}`;
      document.getElementById('calib-status').className='calib-status err';
      setTimeout(()=>{document.getElementById('calib-status').textContent='';},2000);
    }
  });
}

function deleteAllCalib(){
  if(!confirm('确认删除所有校准数据？此操作不可撤销！'))return;
  fetch('/api/calibrate/delete_all',{method:'POST'}).then(r=>r.json()).then(d=>{
    if(d.ok){
      document.getElementById('calib-status').textContent='已清空全部校准数据';
      document.getElementById('calib-status').className='calib-status err';
      setTimeout(()=>{document.getElementById('calib-status').textContent='';},2000);
    }
  });
}

// ── Config update ──
let cfgTimer = null;
function updateCfg() {
  const cfg = {};
  document.querySelectorAll('#thresh-area input[type=range]').forEach(sl => {
    const p = sl.dataset.pose, k = sl.dataset.key;
    if (!cfg[p]) cfg[p] = {};
    cfg[p][k] = parseFloat(sl.value);
    sl.nextElementSibling.textContent = parseFloat(sl.value).toFixed(1);
  });
  cfg.pitch_limit = parseInt(document.getElementById('sl-pitch').value);
  document.getElementById('sv-pitch').textContent = cfg.pitch_limit + '°';
  clearTimeout(cfgTimer);
  cfgTimer = setTimeout(() => {
    fetch('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(cfg)});
  }, 300);
}

// ── Polling ──
let lastSnapLen = 0;
function poll() {
  fetch('/api/status').then(r=>r.json()).then(d => {
    // Emotion
    const emo = d.emotion || 'uncalibrated';
    const el = document.getElementById('emo-text');
    el.textContent = (EMO_EMOJI[emo]||'') + ' ' + (EMO_CN[emo]||emo).toUpperCase();
    el.className = 'emo-big ' + emo;
    document.getElementById('emo-pose').textContent = '姿态 ' + (d.pose||'-');
    document.getElementById('emo-conf').textContent = '置信度 ' + (d.confidence||0).toFixed(2);

    // Bars
    const sc = d.scores || {};
    EMOS.forEach(e => {
      const pct = Math.round((sc[e]||0)*100);
      document.getElementById('bar-'+e).style.width = pct+'%';
      document.getElementById('val-'+e).textContent = pct+'%';
    });

    // Pose/Angle
    document.getElementById('v-pose').textContent = POSE_CN[d.pose] || d.pose || '-';
    document.getElementById('v-pitch').textContent = d.pitch || 0;
    document.getElementById('v-yaw').textContent = d.yaw || 0;

    // AU
    const au = d.au || {};
    AU_SHOW.forEach(k => document.getElementById('au-'+k).textContent = (au[k]||0).toFixed(0));

    // Calib table
    renderCalibTable(d.calibrated||{}, d.calib_pose, d.calib_emotion, d.calib_count);
    if (d.calibrating) {
      document.getElementById('calib-status').textContent = `采集中 ${POSE_CN[d.calib_pose]||d.calib_pose} / ${EMO_CN[d.calib_emo]||d.calib_emo}：${d.calib_count}/30`;
      document.getElementById('calib-status').className = 'calib-status ok';
    }

    // Thresholds (only init once or when empty)
    if (!document.getElementById('thresh-area').children.length && d.config) renderThresh(d.config);
    if (d.config && d.config.pitch_limit !== undefined) {
      document.getElementById('sl-pitch').value = d.config.pitch_limit;
      document.getElementById('sv-pitch').textContent = d.config.pitch_limit + '°';
    }
  }).catch(()=>{
    errCount++;
    if(errCount===3){
      document.getElementById('emo-text').textContent='⚠ 连接中断';
      document.getElementById('emo-text').className='emo-big no_face';
    }
  });
}

function pollTimeline() {
  fetch('/api/timeline').then(r=>r.json()).then(d => {
    chartData = d;
    if (autoScroll && d.length > 0) viewEnd = d[d.length-1].t + 2;
    drawChart();
  });
}

function pollSnapshots() {
  fetch('/api/snaps').then(r=>r.json()).catch(()=>fetch('/api/snapshots').then(r=>r.json())).then(d => {
    const list = document.getElementById('snap-list');
    list.innerHTML = '';
    (d||[]).forEach(s => {
      if(s.e!=='no_face'&&s.e!=='uncalibrated'&&s.e!=='out_of_range'&&s.e!=='speaking'){
        const div = document.createElement('div');
        div.className = 'snap-item ' + s.e;
        div.innerHTML = `<img src="data:image/jpeg;base64,${s.img}"><div class="lbl">${s.t.toFixed(1)}s</div>`;
        list.appendChild(div);
      }
    });
  });
}

let errCount=0;
setInterval(poll, 150);
setInterval(pollTimeline, 1000);
setInterval(pollSnapshots, 1000);
poll();
setTimeout(() => { pollTimeline(); pollSnapshots(); }, 500);
</script>
</body>
</html>
