<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AU 实时情绪推理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#eee;font-family:'Segoe UI',sans-serif;display:flex;height:100vh}
video,img{display:block}
.panel{width:360px;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;border-right:1px solid #333}
.panel-r{border-right:none;border-left:1px solid #333}
.feed{flex:1;display:flex;align-items:center;justify-content:center;background:#111}
.feed img{max-width:100%;max-height:100%;object-fit:contain}
h3{font-size:13px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.card{background:#16213e;border-radius:8px;padding:12px}
.emotion-big{font-size:28px;font-weight:700;text-align:center;padding:8px 0}
.emotion-big.calm{color:#8e8e8e}
.emotion-big.happy{color:#4ecca3}
.emotion-big.sad{color:#e74c3c}
.emotion-big.uncalibrated{color:#f39c12}
.emotion-big.out_of_range{color:#e67e22}
.emotion-big.no_face{color:#e74c3c}
.bar-row{display:flex;align-items:center;gap:8px;margin:3px 0;font-size:13px}
.bar-row .lbl{width:45px;text-align:right;color:#aaa}
.bar-row .bar{flex:1;height:16px;background:#0f3460;border-radius:4px;overflow:hidden;position:relative}
.bar-row .fill{height:100%;border-radius:4px;transition:width .15s}
.bar-row .val{width:38px;font-size:12px;color:#aaa}
.fill.calm{background:#8e8e8e}
.fill.happy{background:#4ecca3}
.fill.sad{background:#e74c3c}
.au-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;font-size:12px}
.au-grid .au-item{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #1a1a3e}
.au-grid .au-name{color:#aaa}
.au-grid .au-val{color:#4ecca3;font-weight:600;min-width:36px;text-align:right}
.info-row{display:flex;justify-content:space-between;font-size:13px;padding:2px 0}
.info-row .k{color:#888}
.info-row .v{color:#ddd}
.calib-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.calib-btns button{padding:10px;border:1px solid #333;border-radius:6px;background:#16213e;color:#eee;cursor:pointer;font-size:13px;transition:all .15s}
.calib-btns button:hover{background:#0f3460;border-color:#4ecca3}
.calib-btns button.active{background:#4ecca3;color:#111;border-color:#4ecca3}
.slider-row{display:flex;align-items:center;gap:10px;margin:6px 0}
.slider-row label{width:90px;font-size:13px;color:#aaa;flex-shrink:0}
.slider-row input[type=range]{flex:1;accent-color:#4ecca3}
.slider-row .sv{width:32px;font-size:13px;color:#4ecca3;text-align:right}
</style>
</head>
<body>

<!-- 左面板：AU值 + 姿态 -->
<div class="panel">
  <div class="card">
    <h3>姿态 / 角度</h3>
    <div class="info-row"><span class="k">姿态</span><span class="v" id="pose">-</span></div>
    <div class="info-row"><span class="k">Pitch</span><span class="v" id="pitch">0</span></div>
    <div class="info-row"><span class="k">Yaw</span><span class="v" id="yaw">0</span></div>
    <div class="info-row"><span class="k">Roll</span><span class="v" id="roll">0</span></div>
  </div>
  <div class="card">
    <h3>关键 Action Units</h3>
    <div class="au-grid" id="au-grid"></div>
  </div>
</div>

<!-- 中间：视频 -->
<div class="feed">
  <img src="/video_feed" alt="feed">
</div>

<!-- 右面板：情绪 + 校准 + 阈值 -->
<div class="panel panel-r">
  <div class="card">
    <h3>实时情绪</h3>
    <div class="emotion-big" id="emotion-text">未校准</div>
    <div class="info-row"><span class="k">置信度</span><span class="v" id="conf">0.00</span></div>
  </div>
  <div class="card">
    <h3>情绪分数</h3>
    <div class="bar-row"><span class="lbl">平静</span><div class="bar"><div class="fill calm" id="bar-calm" style="width:0%"></div></div><span class="val" id="val-calm">0%</span></div>
    <div class="bar-row"><span class="lbl">高兴</span><div class="bar"><div class="fill happy" id="bar-happy" style="width:0%"></div></div><span class="val" id="val-happy">0%</span></div>
    <div class="bar-row"><span class="lbl">沮丧</span><div class="bar"><div class="fill sad" id="bar-sad" style="width:0%"></div></div><span class="val" id="val-sad">0%</span></div>
  </div>
  <div class="card">
    <h3>分姿态校准</h3>
    <p style="font-size:12px;color:#888;margin-bottom:8px">保持对应姿态 + 平静表情，点击按钮</p>
    <div class="calib-btns" id="calib-btns">
      <button onclick="calib('front')">😐 平视</button>
      <button onclick="calib('up')">😐 抬头</button>
      <button onclick="calib('down')">😐 低头</button>
      <button onclick="calib('side')">😐 侧脸</button>
    </div>
    <div id="calib-status" style="font-size:12px;color:#4ecca3;margin-top:6px;min-height:16px"></div>
  </div>
  <div class="card">
    <h3>情绪阈值调节</h3>
    <p style="font-size:11px;color:#666;margin-bottom:6px">值越小越灵敏，越大越难触发</p>
    <div class="slider-row">
      <label>高兴阈值</label>
      <input type="range" min="0.5" max="4" step="0.1" id="sl-h" oninput="updateCfg()">
      <span class="sv" id="sv-h">1.5</span>
    </div>
    <div class="slider-row">
      <label>沮丧阈值</label>
      <input type="range" min="0.5" max="4" step="0.1" id="sl-s" oninput="updateCfg()">
      <span class="sv" id="sv-s">1.5</span>
    </div>
    <div class="slider-row">
      <label>角度限制</label>
      <input type="range" min="15" max="45" step="1" id="sl-p" oninput="updateCfg()">
      <span class="sv" id="sv-p">30°</span>
    </div>
  </div>
</div>

<script>
const AU_SHOW = ['AU12','AU6','AU25','AU7','AU5','AU15','AU4','AU17','AU1','AU9'];
const AU_LABEL = {AU12:'嘴角上拉',AU6:'颧骨提升',AU25:'嘴唇分开',AU7:'眼睑收紧',
  AU5:'上睑抬起',AU15:'嘴角下拉',AU4:'皱眉',AU17:'下巴上提',AU1:'内眉上抬',AU9:'鼻皱'};
const EMOJI = {calm:'😐',happy:'😊',sad:'😢',uncalibrated:'❓',no_face:'👁️',out_of_range:'🚫'};

// 初始化 AU 网格
const auGrid = document.getElementById('au-grid');
AU_SHOW.forEach(k => {
  const d = document.createElement('div');
  d.className = 'au-item';
  d.innerHTML = `<span class="au-name">${AU_LABEL[k]||k}</span><span class="au-val" id="au-${k}">0</span>`;
  auGrid.appendChild(d);
});

// 轮询状态
let calibrating = null;
function poll(){
  fetch('/api/status').then(r=>r.json()).then(d=>{
    // 姿态
    document.getElementById('pose').textContent = d.pose||'-';
    document.getElementById('pitch').textContent = d.pitch||0;
    document.getElementById('yaw').textContent = d.yaw||0;
    document.getElementById('roll').textContent = d.roll||0;

    // 情绪
    const emo = d.emotion||'uncalibrated';
    const el = document.getElementById('emotion-text');
    el.textContent = (EMOJI[emo]||'') + ' ' + emo.toUpperCase();
    el.className = 'emotion-big ' + emo;
    document.getElementById('conf').textContent = (d.confidence||0).toFixed(2);

    // 分数条
    const sc = d.scores||{};
    ['calm','happy','sad'].forEach(e=>{
      const pct = Math.round((sc[e]||0)*100);
      document.getElementById('bar-'+e).style.width = pct+'%';
      document.getElementById('val-'+e).textContent = pct+'%';
    });

    // AU 值
    const au = d.au||{};
    AU_SHOW.forEach(k=>{
      document.getElementById('au-'+k).textContent = (au[k]||0).toFixed(0);
    });

    // 校准状态
    if(d.calibrating){
      calibrating = d.calib_pose;
      document.getElementById('calib-status').textContent = `采集中 ${d.calib_count}/30 ...`;
      document.querySelectorAll('#calib-btns button').forEach(b=>{
        b.classList.toggle('active', b.textContent.includes(
          calibrating==='front'?'平视':calibrating==='up'?'抬头':calibrating==='down'?'低头':'侧脸'));
      });
    } else if(calibrating){
      calibrating = null;
      document.getElementById('calib-status').textContent = '✅ 完成';
      document.querySelectorAll('#calib-btns button').forEach(b=>b.classList.remove('active'));
    }

    // 同步滑块
    const cfg = d.config||{};
    if(cfg.h_thresh !== undefined){
      document.getElementById('sl-h').value = cfg.h_thresh;
      document.getElementById('sv-h').textContent = cfg.h_thresh.toFixed(1);
    }
    if(cfg.s_thresh !== undefined){
      document.getElementById('sl-s').value = cfg.s_thresh;
      document.getElementById('sv-s').textContent = cfg.s_thresh.toFixed(1);
    }
    if(cfg.pitch_limit !== undefined){
      document.getElementById('sl-p').value = cfg.pitch_limit;
      document.getElementById('sv-p').textContent = cfg.pitch_limit + '°';
    }
  });
}
setInterval(poll, 150);
poll();

// 校准
function calib(pose){
  if(calibrating) return;
  fetch('/api/calibrate/start',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pose})}).then(r=>r.json()).then(()=>{
    document.getElementById('calib-status').textContent = '采集中 0/30 ...';
  });
}

// 阈值调节
let cfgTimer = null;
function updateCfg(){
  const h = parseFloat(document.getElementById('sl-h').value);
  const s = parseFloat(document.getElementById('sl-s').value);
  const p = parseInt(document.getElementById('sl-p').value);
  document.getElementById('sv-h').textContent = h.toFixed(1);
  document.getElementById('sv-s').textContent = s.toFixed(1);
  document.getElementById('sv-p').textContent = p + '°';
  clearTimeout(cfgTimer);
  cfgTimer = setTimeout(()=>{
    fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({h_thresh:h, s_thresh:s, pitch_limit:p})});
  }, 200);
}
</script>
</body>
</html>
