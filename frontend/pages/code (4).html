<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康趋势</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 16px;
  }
  .card {
    background: #fff; border-radius: 16px; width: 100%; max-width: 640px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 24px;
  }
  .tab-btn {
    padding: 6px 18px; border: none; background: #f0f0f0; color: #888;
    border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500;
    transition: all .2s;
  }
  .tab-btn.active { background: #22c997; color: #fff; }
  .stat-item { text-align: center; }
  .stat-item .val { font-size: 20px; font-weight: 700; }
  .stat-item .lab { font-size: 12px; color: #999; margin-top: 2px; }
</style>
</head>
<body>

<div class="card">
  <!-- 头部 -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <div>
      <div style="font-size:17px;font-weight:700;">健康趋势</div>
      <div style="font-size:12px;color:#999;margin-top:2px;">心肺频率比监测</div>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="tab-btn active" data-tab="day">日</button>
      <button class="tab-btn" data-tab="week">周</button>
      <button class="tab-btn" data-tab="year">年</button>
    </div>
  </div>

  <!-- 图表 -->
  <div style="height:240px;position:relative;">
    <canvas id="chart"></canvas>
  </div>

  <!-- 统计 -->
  <div id="stats" style="display:flex;gap:12px;margin-top:16px;"></div>
</div>

<script>
// 假数据
const DATA = {
  day: {
    labels: Array.from({length:24},(_,i)=>`${String(i).padStart(2,'0')}:00`),
    values: [1.05,1.02,0.98,0.95,0.92,0.88,0.96,1.10,1.22,1.18,1.30,1.28,1.15,1.32,1.45,1.62,1.55,1.40,1.28,1.18,1.35,1.48,1.25,1.10],
    stats: [{val:'1.18',lab:'平均值'},{val:'1.62',lab:'最高值'},{val:'2.5h',lab:'异常时长'}]
  },
  week: {
    labels: ['周一','周二','周三','周四','周五','周六','周日'],
    normal: [18,20,16,22,19,14,21],
    abnormal: [3,2,5,1,3,6,2],
    stats: [{val:'130',lab:'正常总次数'},{val:'22',lab:'异常总次数'},{val:'周六',lab:'异常最多'}]
  },
  year: {
    labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
    normal: [520,480,510,540,560,530,500,490,550,570,540,530],
    abnormal: [45,52,38,30,25,35,48,55,28,22,32,38],
    stats: [{val:'6,320',lab:'年度正常'},{val:'448',lab:'年度异常'},{val:'10月',lab:'最健康月份'}]
  }
};

const MIN = 0.8, MAX = 1.5;
let chart = null;
const ctx = document.getElementById('chart').getContext('2d');

// 日趋势 - 曲线图
function renderDay() {
  const d = DATA.day;
  const points = d.values.map(v => (v < MIN || v > MAX) ? 4 : 0);
  const pColor = d.values.map(v => (v < MIN || v > MAX) ? '#f0654a' : '#22c997');
  const grad = ctx.createLinearGradient(0,0,0,240);
  grad.addColorStop(0,'rgba(34,201,151,0.15)');
  grad.addColorStop(1,'rgba(34,201,151,0)');

  chart = new Chart(ctx, {
    type:'line',
    data:{
      labels: d.labels,
      datasets:[{
        data: d.values, borderColor:'#22c997', borderWidth:2,
        backgroundColor: grad, fill:true, tension:0.4,
        pointRadius: points, pointBackgroundColor: pColor,
        pointBorderColor: pColor, pointHoverRadius:5
      }]
    },
    options: lineOpts(),
    plugins:[rangePlugin]
  });
}

// 折线图公共配置
function lineOpts() {
  return {
    responsive:true, maintainAspectRatio:false,
    animation:{duration:500},
    plugins:{legend:{display:false},tooltip:{
      backgroundColor:'#fff', titleColor:'#333', bodyColor:'#333',
      borderColor:'#eee', borderWidth:1, cornerRadius:6, padding:8
    }},
    scales:{
      x:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{color:'#aaa',font:{size:10},maxTicksLimit:8},border:{display:false}},
      y:{min:0.5,max:2.0,grid:{color:'rgba(0,0,0,0.04)'},ticks:{color:'#aaa',font:{size:10}},border:{display:false}}
    }
  };
}

// 正常区间绘制插件
const rangePlugin = {
  beforeDraw(c) {
    const {ctx:c2,chartArea:{left,right},scales:{y}} = c;
    const yT = y.getPixelForValue(MAX), yB = y.getPixelForValue(MIN);
    c2.save();
    c2.fillStyle = 'rgba(34,201,151,0.04)';
    c2.fillRect(left, yT, right-left, yB-yT);
    c2.setLineDash([5,3]);
    c2.strokeStyle = 'rgba(200,170,50,0.3)';
    c2.lineWidth = 1;
    [yT,yB].forEach(yy => { c2.beginPath(); c2.moveTo(left,yy); c2.lineTo(right,yy); c2.stroke(); });
    c2.restore();
  }
};

// 周/年 - 柱状图
function renderBar(key) {
  const d = DATA[key];
  chart = new Chart(ctx, {
    type:'bar',
    data:{
      labels: d.labels,
      datasets:[
        {label:'正常',data:d.normal,backgroundColor:'rgba(34,201,151,0.7)',borderRadius:4,barPercentage:0.6},
        {label:'异常',data:d.abnormal,backgroundColor:'rgba(240,101,74,0.7)',borderRadius:4,barPercentage:0.6}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:500},
      plugins:{
        legend:{position:'top',align:'end',labels:{font:{size:11},boxWidth:10,padding:10}},
        tooltip:{backgroundColor:'#fff',titleColor:'#333',bodyColor:'#333',borderColor:'#eee',borderWidth:1,cornerRadius:6,padding:8}
      },
      scales:{
        x:{stacked:true,grid:{display:false},ticks:{color:'#aaa',font:{size:10}},border:{display:false}},
        y:{stacked:true,beginAtZero:true,grid:{color:'rgba(0,0,0,0.04)'},ticks:{color:'#aaa',font:{size:10}},border:{display:false}}
      }
    }
  });
}

// 统计
function renderStats(tab) {
  document.getElementById('stats').innerHTML = DATA[tab].stats.map(s =>
    `<div class="stat-item" style="flex:1;background:#f8f8f8;border-radius:10px;padding:12px;">
      <div class="val">${s.val}</div><div class="lab">${s.lab}</div>
    </div>`
  ).join('');
}

// 切换
let cur = 'day';
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    if (tab === cur) return;
    cur = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
    if (chart) chart.destroy();
    if (tab === 'day') renderDay(); else renderBar(tab);
    renderStats(tab);
  });
});

// 初始
renderDay();
renderStats('day');
</script>
</body>
</html>
