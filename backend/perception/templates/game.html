<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>打地鼠游戏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #f8fafc; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; overflow: hidden; }

.container { display: flex; flex-direction: column; width: 100%; height: 100%; padding: 12px; gap: 12px; }

.header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #ffffff; border-radius: 10px; border: 1px solid #e2e8f0; }
.header-item { display: flex; align-items: center; gap: 8px; }
.header-label { font-size: 13px; color: #64748b; font-weight: 500; }
.header-value { font-size: 22px; font-weight: 700; color: #1e293b; }
.header-value.time { color: #dc3545; }
.header-value.score { color: #22c55e; }
.header-value.difficulty { color: #3b82f6; }
.header-value.accuracy { color: #8b5cf6; }
.header-value.reaction { color: #06b6d4; }
.mood-indicator { width: 20px; height: 20px; border-radius: 50%; }
.mood-indicator.flow { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
.mood-indicator.easy { background: #f59e0b; }
.mood-indicator.hard { background: #ef4444; }

.main-content { display: flex; flex: 1; gap: 12px; min-height: 0; }

.game-area { flex: 4; background: #ffffff; border-radius: 10px; border: 1px solid #e2e8f0; padding: 16px; display: flex; flex-direction: column; }
.game-title { font-size: 18px; color: #1e293b; margin-bottom: 8px; text-align: center; font-weight: 600; }
.game-mood { font-size: 12px; color: #64748b; text-align: center; margin-bottom: 12px; }

.moles-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); gap: 14px; flex: 1; }
.mole-hole { background: linear-gradient(180deg, #4b5563 0%, #374151 50%, #1f2937 100%); border-radius: 50%; cursor: pointer; position: relative; overflow: hidden; transition: all 0.15s; box-shadow: inset 0 8px 20px rgba(0,0,0,0.5), 0 4px 8px rgba(0,0,0,0.3); }
.mole-hole:hover { transform: scale(1.02); box-shadow: inset 0 8px 20px rgba(0,0,0,0.5), 0 6px 12px rgba(0,0,0,0.4); }
.mole-hole:active { transform: scale(0.98); }
.mole-hole.hit { background: linear-gradient(180deg, #f87171 0%, #ef4444 100%); }
.mole-hole.success { background: linear-gradient(180deg, #6ee7b7 0%, #34d399 100%); }

.mole-container { position: absolute; bottom: -70%; left: 50%; transform: translateX(-50%); width: 65%; height: 65%; display: flex; align-items: center; justify-content: center; transition: bottom 0.25s ease; }
.mole-container.visible { bottom: 10%; }

.mole { font-size: 56px; text-align: center; }
.mole.bomb-mole { font-size: 48px; }

.bomb-indicator { position: absolute; top: 10%; right: 10%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 18px; animation: bombPulse 1s ease-in-out infinite; }
.bomb-indicator.hidden { display: none; }

@keyframes bombPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}

.game-controls { display: flex; gap: 10px; margin-top: 16px; }
.btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-start { background: #22c55e; color: #fff; }
.btn-start:hover { background: #16a34a; }
.btn-pause { background: #f59e0b; color: #fff; }
.btn-pause:hover { background: #d97706; }
.btn-stop { background: #ef4444; color: #fff; }
.btn-stop:hover { background: #dc2626; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.results-area { flex: 1; background: #ffffff; border-radius: 10px; border: 1px solid #e2e8f0; padding: 12px; display: flex; flex-direction: column; }
.results-title { font-size: 14px; color: #475569; margin-bottom: 10px; font-weight: 600; }
.results-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
.results-list::-webkit-scrollbar { width: 4px; }
.results-list::-webkit-scrollbar-track { background: #f1f5f9; }
.results-list::-webkit-scrollbar-thumb { background: #cbd5e1; }

.result-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: #f8fafc; border-radius: 6px; font-size: 12px; }
.result-hit { color: #22c55e; font-weight: 600; }
.result-miss { color: #f59e0b; font-weight: 600; }
.result-error { color: #ef4444; font-weight: 600; }
.result-bomb { color: #ef4444; font-weight: 600; }
.result-time { color: #64748b; }
.result-diff { color: #3b82f6; }
.result-score { color: #f59e0b; font-weight: 700; }

.game-over-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
.game-over-card { background: #ffffff; border-radius: 16px; padding: 32px; text-align: center; }
.game-over-title { font-size: 28px; font-weight: 700; color: #1e293b; margin-bottom: 16px; }
.game-over-score { font-size: 20px; color: #f59e0b; margin-bottom: 16px; }
.game-over-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; padding: 12px; background: #f8fafc; border-radius: 8px; }
.stat-item { text-align: center; }
.stat-label { font-size: 11px; color: #64748b; }
.stat-value { font-size: 16px; font-weight: 700; color: #1e293b; }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-item">
            <span class="header-label">⏱️ 时间</span>
            <span class="header-value time" id="time">3:00</span>
        </div>
        <div class="header-item">
            <span class="header-label">🏆 得分</span>
            <span class="header-value score" id="score">0</span>
        </div>
        <div class="header-item">
            <span class="header-label">⚡ 难度</span>
            <span class="header-value difficulty" id="difficulty">1</span>
            <span id="difficulty-name">简单</span>
        </div>
        <div class="header-item">
            <span class="header-label">🎯 准确率</span>
            <span class="header-value accuracy" id="accuracy">--</span>
        </div>
        <div class="header-item">
            <span class="header-label">🎮 状态</span>
            <div class="mood-indicator" id="mood-indicator"></div>
            <span id="mood-text">准备</span>
        </div>
    </div>
    
    <div class="main-content">
        <div class="game-area">
            <div class="game-title">🐹 打地鼠游戏</div>
            <div class="game-mood" id="flow-message">找到你的心流状态！</div>
            
            <div class="moles-grid" id="moles-grid">
                <div class="mole-hole" data-hole="0">
                    <div class="mole-container">
                        <div class="mole">🐹</div>
                        <div class="bomb-indicator hidden">💣</div>
                    </div>
                </div>
                <div class="mole-hole" data-hole="1">
                    <div class="mole-container">
                        <div class="mole">🐹</div>
                        <div class="bomb-indicator hidden">💣</div>
                    </div>
                </div>
                <div class="mole-hole" data-hole="2">
                    <div class="mole-container">
                        <div class="mole">🐹</div>
                        <div class="bomb-indicator hidden">💣</div>
                    </div>
                </div>
                <div class="mole-hole" data-hole="3">
                    <div class="mole-container">
                        <div class="mole">🐹</div>
                        <div class="bomb-indicator hidden">💣</div>
                    </div>
                </div>
                <div class="mole-hole" data-hole="4">
                    <div class="mole-container">
                        <div class="mole">🐹</div>
                        <div class="bomb-indicator hidden">💣</div>
                    </div>
                </div>
                <div class="mole-hole" data-hole="5">
                    <div class="mole-container">
                        <div class="mole">🐹</div>
                        <div class="bomb-indicator hidden">💣</div>
                    </div>
                </div>
                <div class="mole-hole" data-hole="6">
                    <div class="mole-container">
                        <div class="mole">🐹</div>
                        <div class="bomb-indicator hidden">💣</div>
                    </div>
                </div>
                <div class="mole-hole" data-hole="7">
                    <div class="mole-container">
                        <div class="mole">🐹</div>
                        <div class="bomb-indicator hidden">💣</div>
                    </div>
                </div>
            </div>
            
            <div class="game-controls">
                <button class="btn btn-start" id="btn-start">开始游戏</button>
                <button class="btn btn-pause" id="btn-pause" disabled>暂停</button>
                <button class="btn btn-stop" id="btn-stop" disabled>结束游戏</button>
            </div>
        </div>
        
        <div class="results-area">
            <div class="results-title">📊 游戏记录</div>
            <div class="results-list" id="results-list"></div>
        </div>
    </div>
</div>

<div class="game-over-overlay" id="game-over" style="display: none;">
    <div class="game-over-card">
        <div class="game-over-title">游戏结束!</div>
        <div class="game-over-score">最终得分: <span id="final-score">0</span></div>
        <div class="game-over-stats">
            <div class="stat-item">
                <div class="stat-label">准确率</div>
                <div class="stat-value" id="final-accuracy">0%</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">反应时间</div>
                <div class="stat-value" id="final-reaction">0ms</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">最佳难度</div>
                <div class="stat-value" id="final-difficulty">1</div>
            </div>
        </div>
        <button class="btn btn-start" onclick="resetGame()">再来一局</button>
    </div>
</div>

<script>
const FLOW_ACCURACY_MIN = 65;
const FLOW_ACCURACY_MAX = 85;

let gameState = {
    running: false,
    paused: false,
    timeLeft: 180,
    score: 0,
    difficulty: 1,
    difficultyName: '简单',
    accuracy: '--',
    hitCount: 0,
    missCount: 0,
    reactionTimes: [],
    results: [],
    timer: null
};

function updateUI() {
    const mins = Math.floor(gameState.timeLeft / 60);
    const secs = gameState.timeLeft % 60;
    document.getElementById('time').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
    document.getElementById('score').textContent = gameState.score;
    document.getElementById('difficulty').textContent = gameState.difficulty;
    document.getElementById('difficulty-name').textContent = gameState.difficultyName;
    document.getElementById('accuracy').textContent = gameState.accuracy + (gameState.accuracy !== '--' ? '%' : '');
    
    updateMoodIndicator();
}

function updateMoodIndicator() {
    const indicator = document.getElementById('mood-indicator');
    const text = document.getElementById('mood-text');
    const flowMsg = document.getElementById('flow-message');
    
    const total = gameState.hitCount + gameState.missCount;
    if (total < 5) {
        indicator.className = 'mood-indicator';
        text.textContent = '准备';
        flowMsg.textContent = '找到你的心流状态！';
        return;
    }
    
    const accuracy = (gameState.hitCount / total * 100);
    
    if (accuracy >= FLOW_ACCURACY_MIN && accuracy <= FLOW_ACCURACY_MAX) {
        indicator.className = 'mood-indicator flow';
        text.textContent = '心流';
        flowMsg.textContent = '✨ 太棒了！保持这个状态！';
    } else if (accuracy > FLOW_ACCURACY_MAX) {
        indicator.className = 'mood-indicator easy';
        text.textContent = '轻松';
        flowMsg.textContent = '🎯 太简单了，准备提高难度...';
    } else {
        indicator.className = 'mood-indicator hard';
        text.textContent = '挑战';
        flowMsg.textContent = '💪 有点难，准备降低难度...';
    }
}

function showResults() {
    const list = document.getElementById('results-list');
    if (gameState.results.length === 0) {
        list.innerHTML = '';
        return;
    }
    
    const recentResults = gameState.results.slice(-10);
    let html = '';
    
    recentResults.forEach((r) => {
        let typeClass = 'result-hit';
        let typeText = '✓ 打中';
        if (r.type === 'miss') {
            typeClass = 'result-miss';
            typeText = '○ 漏打';
        } else if (r.type === 'error') {
            typeClass = 'result-error';
            typeText = '✗ 打错';
        } else if (r.type === 'bomb') {
            typeClass = 'result-bomb';
            typeText = '💣 炸弹';
        }
        
        html += `
            <div class="result-item">
                <span class="${typeClass}">${typeText}</span>
                <span class="result-time">${r.time === '--' ? '--' : r.time + 'ms'}</span>
                <span class="result-diff">Lv.${r.difficulty}</span>
                <span class="result-score">${r.score > 0 ? '+' : ''}${r.score}</span>
            </div>
        `;
    });
    
    list.innerHTML = html;
    list.scrollTop = list.scrollHeight;
}

function syncMoles() {
    fetch('/api/game/moles')
        .then(r => r.json())
        .then(data => {
            updateMoles(data.moles, data.is_bomb);
        })
        .catch(e => console.error('同步地鼠状态失败:', e));
}

function updateMoles(moles, isBombData) {
    const holes = document.querySelectorAll('.mole-hole');
    
    holes.forEach((hole, index) => {
        const moleContainer = hole.querySelector('.mole-container');
        const mole = hole.querySelector('.mole');
        const bombIndicator = hole.querySelector('.bomb-indicator');
        
        const isVisible = moles.includes(index);
        const isBomb = isBombData && isBombData[index];
        
        if (isVisible) {
            moleContainer.classList.add('visible');
            mole.textContent = isBomb ? '💣' : '🐹';
            bombIndicator.classList.toggle('hidden', !isBomb);
        } else {
            moleContainer.classList.remove('visible');
        }
    });
}

function handleHit(event) {
    if (!gameState.running || gameState.paused) return;
    
    const hole = event.currentTarget;
    const holeIndex = parseInt(hole.dataset.hole);
    
    fetch('/api/game/hit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hole: holeIndex })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            gameState.score = data.score;
            gameState.accuracy = data.accuracy;
            
            if (data.type === 'error') {
                hole.classList.add('hit');
                setTimeout(() => hole.classList.remove('hit'), 200);
            } else {
                hole.classList.add('success');
                setTimeout(() => hole.classList.remove('success'), 200);
            }
            
            updateUI();
            syncState();
        }
    })
    .catch(e => console.error('击打请求失败:', e));
}

function startGame() {
    if (gameState.running) return;
    
    fetch('/api/game/start', { method: 'POST' })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                gameState.running = true;
                gameState.paused = false;
                gameState.timeLeft = data.state.timeLeft;
                gameState.score = data.state.score;
                gameState.difficulty = data.state.difficulty;
                gameState.difficultyName = data.state.difficultyName;
                gameState.accuracy = data.state.accuracy;
                gameState.results = data.state.results || [];
                gameState.hitCount = data.state.hitCount || 0;
                gameState.missCount = data.state.missCount || 0;
                gameState.reactionTimes = [];
                
                document.getElementById('btn-start').disabled = true;
                document.getElementById('btn-pause').disabled = false;
                document.getElementById('btn-stop').disabled = false;
                document.getElementById('btn-pause').textContent = '暂停';
                document.getElementById('game-over').style.display = 'none';
                
                updateUI();
                showResults();
                
                if (gameState.timer) {
                    clearInterval(gameState.timer);
                    gameState.timer = null;
                }
                
                gameState.timer = setInterval(() => {
                if (gameState.running && !gameState.paused) {
                    syncState();
                }
            }, 200);
                
                syncMoles();
            }
        })
        .catch(e => {
            console.error('开始游戏失败:', e);
            document.getElementById('btn-start').disabled = false;
        });
}

function togglePause() {
    fetch('/api/game/pause', { method: 'POST' })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                gameState.paused = data.state.status === 'paused';
                document.getElementById('btn-pause').textContent = gameState.paused ? '继续' : '暂停';
                
                const holes = document.querySelectorAll('.mole-hole');
                holes.forEach(hole => {
                    const moleContainer = hole.querySelector('.mole-container');
                    if (gameState.paused) {
                        moleContainer.classList.remove('visible');
                    }
                });
                
                if (!gameState.paused) {
                    syncMoles();
                }
            }
        })
        .catch(e => console.error('暂停/继续失败:', e));
}

function endGame() {
    if (!gameState.running) return;
    
    fetch('/api/game/end', { method: 'POST' })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                gameState.running = false;
                gameState.paused = false;
                
                if (gameState.timer) {
                    clearInterval(gameState.timer);
                    gameState.timer = null;
                }
                
                document.getElementById('btn-start').disabled = false;
                document.getElementById('btn-pause').disabled = true;
                document.getElementById('btn-stop').disabled = true;
                
                const holes = document.querySelectorAll('.mole-hole');
                holes.forEach(hole => {
                    const moleContainer = hole.querySelector('.mole-container');
                    moleContainer.classList.remove('visible');
                });
                
                document.getElementById('final-score').textContent = gameState.score;
                document.getElementById('final-accuracy').textContent = gameState.accuracy + '%';
                
                const avgReaction = gameState.reactionTimes.length > 0 
                    ? Math.round(gameState.reactionTimes.reduce((a,b) => a+b, 0) / gameState.reactionTimes.length) 
                    : '0';
                document.getElementById('final-reaction').textContent = avgReaction + 'ms';
                document.getElementById('final-difficulty').textContent = `${gameState.difficulty} (${gameState.difficultyName})`;
                
                document.getElementById('game-over').style.display = 'flex';
            }
        })
        .catch(e => console.error('结束游戏失败:', e));
}

function resetGame() {
    fetch('/api/game-state')
        .then(r => r.json())
        .then(state => {
            gameState = {
                running: false,
                paused: false,
                timeLeft: state.timeLeft || 180,
                score: 0,
                difficulty: state.difficulty || 1,
                difficultyName: state.difficultyName || '简单',
                accuracy: '--',
                hitCount: 0,
                missCount: 0,
                reactionTimes: [],
                results: [],
                timer: null
            };
            
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-pause').disabled = true;
            document.getElementById('btn-stop').disabled = true;
            document.getElementById('btn-pause').textContent = '暂停';
            document.getElementById('game-over').style.display = 'none';
            
            const holes = document.querySelectorAll('.mole-hole');
            holes.forEach(hole => {
                const moleContainer = hole.querySelector('.mole-container');
                moleContainer.classList.remove('visible');
            });
            
            updateUI();
        })
        .catch(e => console.error('重置游戏失败:', e));
}

function syncState() {
    fetch('/api/game/sync')
        .then(r => r.json())
        .then(data => {
            const state = data.game_state;
            gameState.timeLeft = state.timeLeft || 180;
            gameState.score = state.score || 0;
            gameState.difficulty = state.difficulty || 1;
            gameState.difficultyName = state.difficultyName || '简单';
            gameState.accuracy = state.accuracy || '--';
            gameState.results = state.results || [];
            gameState.hitCount = state.hitCount || 0;
            gameState.missCount = state.missCount || 0;
            gameState.running = state.running || false;
            gameState.paused = state.status === 'paused';
            
            if (gameState.timeLeft <= 0 && gameState.running) {
                endGame();
                return;
            }
            
            updateUI();
            showResults();
            updateMoles(data.moles, data.is_bomb);
        })
        .catch(e => console.error('同步状态失败:', e));
}

document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-pause').addEventListener('click', togglePause);
document.getElementById('btn-stop').addEventListener('click', endGame);

document.querySelectorAll('.mole-hole').forEach(hole => {
    hole.addEventListener('click', handleHit);
});

fetch('/api/game-state')
    .then(r => r.json())
    .then(state => {
        gameState.difficulty = state.difficulty || 1;
        gameState.difficultyName = state.difficultyName || '简单';
        updateUI();
    })
    .catch(e => {
        console.error('初始化失败:', e);
        updateUI();
    });
</script>
</body>
</html>
