<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LD6002 雷达监测</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
html,body{width:100%;height:100%;background:#0c1018;color:#c8cee0;overflow:hidden}
.wrapper{display:grid;grid-template-rows:auto 1fr 1.5fr auto;height:100vh;gap:10px;padding:14px 16px}
.top-bar{display:flex;align-items:center;justify-content:space-between}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;flex:1}
.card{background:linear-gradient(135deg,#151c2c,#1a2236);border-radius:10px;padding:14px 18px;position:relative;overflow:hidden;border:1px solid #232e44;transition:border-color 0.3s}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;transition:background 0.3s}
.card.blue::before{background:#4285F4}.card.red::before{background:#EA4335}.card.green::before{background:#34A853}.card.yellow::before{background:#FBBC05}.card.purple::before{background:#9C27B0}
.card.status-normal{border-color:#34A853}.card.status-compensating{border-color:#FBBC05}.card.status-compensating::before{background:#FBBC05}
.card.status-away{border-color:#555}.card.status-away::before{background:#555}
.card .label{font-size:12px;color:#6b7a94;margin-bottom:6px;letter-spacing:.5px}
.card .val{font-size:28px;font-weight:700;line-height:1.1;transition:color 0.3s}
.card .unit{font-size:12px;color:#556;margin-left:4px;font-weight:400}
.blue .val{color:#4285F4}.red .val{color:#EA4335}.green .val{color:#34A853}.yellow .val{color:#FBBC05}.purple .val{color:#9C27B0}
.card.status-away .val{color:#555}.card.status-compensating .val{color:#FBBC05}
.mode-group{display:flex;background:#151c2c;border-radius:8px;padding:3px;gap:2px;border:1px solid #232e44;margin-left:14px;flex-shrink:0}
.mode-btn{padding:8px 14px;border:none;border-radius:6px;background:transparent;color:#556;cursor:pointer;font-size:12px;transition:.2s;white-space:nowrap}
.mode-btn.active{background:#4285F4;color:#fff;box-shadow:0 2px 8px rgba(66,133,244,.35)}
.mode-btn:hover:not(.active){color:#8899b0}
.mode-btn.recommended{background:rgba(52,168,83,.15);color:#34A853;border:1px solid rgba(52,168,83,.3)}
.mode-btn.recommended.active{background:#34A853;color:#fff}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;min-height:0}
.chart-panel{background:#111827;border-radius:10px;border:1px solid #1e2a3e;display:flex;flex-direction:column;overflow:hidden}
.chart-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid #1a2438;flex-shrink:0}
.chart-title{font-size:12px;color:#6b7a94;font-weight:600;letter-spacing:.3px}
.chart-hint{font-size:10px;color:#3a4560;display:flex;gap:10px}
.chart-body{flex:1;position:relative;min-height:0;padding:4px 8px 8px}
.chart-body canvas{width:100%!important;height:100%!important}
.controls{display:flex;align-items:center;gap:20px;padding:8px 14px;background:#151c2c;border-radius:8px;border:1px solid #232e44}
.ctrl-group{display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7a94}
.ctrl-group input{width:52px;padding:4px 6px;background:#1a2236;border:1px solid #2a3650;border-radius:5px;color:#c8cee0;text-align:center;font-size:12px}
.ctrl-group input:focus{outline:none;border-color:#4285F4}
.ctrl-group input[type="range"]{width:120px;height:6px;-webkit-appearance:none;background:#1a2236;border-radius:3px;cursor:pointer}
.ctrl-group input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#4285F4;border-radius:50%;cursor:pointer}
.apply-btn{padding:5px 16px;background:#4285F4;border:none;border-radius:5px;color:#fff;font-size:12px;cursor:pointer;transition:.15s}
.apply-btn:hover{background:#5a9cf4}
.apply-btn.active{background:#34A853}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.status-dot.on{background:#34A853;box-shadow:0 0 6px rgba(52,168,83,.6)}.status-dot.off{background:#555}
.mode-tag{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;margin-left:8px}
.mode-tag.stable{background:rgba(52,168,83,.15);color:#34A853}.mode-tag.ultra{background:rgba(255,152,0,.15);color:#FF9800}
.mode-tag.smooth{background:rgba(66,133,244,.15);color:#4285F4}.mode-tag.raw{background:rgba(234,67,53,.15);color:#EA4335}
.status-sub{font-size:10px;margin-top:4px;color:#6b7a94}
.confidence-bar{height:3px;background:#1a2236;border-radius:2px;margin-top:6px;overflow:hidden}
.confidence-fill{height:100%;background:#34A853;border-radius:2px;transition:width 0.5s}
</style>
</head>
<body>
<div class="wrapper">
<div class="top-bar">
<div class="cards">
<div class="card blue" id="cardBreath"><div class="label">呼吸率</div><div><span class="val" id="vBreath">-</span><span class="unit">bpm</span></div><div class="status-sub" id="statusBreath">正常</div><div class="confidence-bar"><div class="confidence-fill" id="confBreath" style="width:0%"></div></div></div>
<div class="card red" id="cardHeart"><div class="label">心率</div><div><span class="val" id="vHeart">-</span><span class="unit">bpm</span></div><div class="status-sub" id="statusHeart">正常</div><div class="confidence-bar"><div class="confidence-fill" id="confHeart" style="width:0%"></div></div></div>
<div class="card green" id="cardDist"><div class="label">距离</div><div><span class="val" id="vDist">-</span><span class="unit">cm</span></div></div>
<div class="card yellow" id="cardStatus"><div class="label">状态</div><div class="val" id="vHuman" style="font-size:22px"><span class="status-dot off" id="dotHuman"></span><span id="txtHuman">等待</span><span class="mode-tag stable" id="modeTag">稳定</span></div><div class="status-sub" id="statusText">数据正常</div></div>
</div>
<div class="mode-group">
<button class="mode-btn recommended active" id="btnStable" onclick="setMode('stable')">稳定(6s)</button>
<button class="mode-btn" id="btnUltra" onclick="setMode('ultra')">超稳(8s)</button>
<button class="mode-btn" id="btnSmooth" onclick="setMode('smooth')">平滑</button>
<button class="mode-btn" id="btnLowfreq" onclick="setMode('lowfreq')">低频</button>
<button class="mode-btn" id="btnRaw" onclick="setMode('raw')">源数据</button>
</div>
</div>
<div class="charts-row">
<div class="chart-panel"><div class="chart-header"><span class="chart-title">实时呼吸波形 (当前模式)</span><span class="chart-hint">最近 60s</span></div><div class="chart-body"><canvas id="rtBreath"></canvas></div></div>
<div class="chart-panel"><div class="chart-header"><span class="chart-title">实时心率波形 (当前模式)</span><span class="chart-hint">最近 60s</span></div><div class="chart-body"><canvas id="rtHeart"></canvas></div></div>
</div>
<div class="charts-row">
<div class="chart-panel"><div class="chart-header"><span class="chart-title">长期呼吸趋势 (点击图例隐藏/显示)</span><span class="chart-hint">滚轮缩放 · 拖拽平移 · 双击还原</span></div><div class="chart-body"><canvas id="ltBreath"></canvas></div></div>
<div class="chart-panel"><div class="chart-header"><span class="chart-title">长期心率趋势 (点击图例隐藏/显示)</span><span class="chart-hint">滚轮缩放 · 拖拽平移 · 双击还原</span></div><div class="chart-body"><canvas id="ltHeart"></canvas></div></div>
</div>
<div class="controls">
<div class="ctrl-group"><span>呼吸Y轴:</span><input type="number" id="bMin" value="0"><span>~</span><input type="number" id="bMax" value="30"></div>
<div class="ctrl-group"><span>心率Y轴:</span><input type="number" id="hMin" value="40"><span>~</span><input type="number" id="hMax" value="120"></div>
<button class="apply-btn" onclick="applyScale()">应用范围</button>
<div style="flex:1"></div>
<div class="ctrl-group"><span>X轴:</span><input type="range" id="xRangeSlider" min="0" max="1000" value="300" style="width:150px"><span id="xRangeValue">300</span></div>
<div style="flex:1"></div>
<div class="ctrl-group" style="color:#3a4560"><span id="pointInfo">0 点</span></div>
</div>
</div>
<script>
function fmtTs(ts) { var d = new Date(ts * 1000); return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0'); }
function toPoints(times, vals) { var pts = []; for (var i = 0; i < times.length; i++) pts.push({ x: times[i], y: vals[i] }); return pts; }

// 状态保存和恢复函数
function saveState() {
    var state = {
        savedXRangeSeconds: savedXRangeSeconds,
        userXMin: userXMin,
        userXMax: userXMax,
        hiddenDatasets: hiddenDatasets,
        isUserZoomed: isUserZoomed
    };
    localStorage.setItem('rppgViewerState', JSON.stringify(state));
}

function restoreState() {
    var saved = localStorage.getItem('rppgViewerState');
    if (saved) {
        try {
            var state = JSON.parse(saved);
            if (state.savedXRangeSeconds !== undefined) {
                savedXRangeSeconds = state.savedXRangeSeconds;
                document.getElementById('xRangeSlider').value = savedXRangeSeconds;
                document.getElementById('xRangeValue').textContent = Math.round(savedXRangeSeconds);
            }
            if (state.userXMin !== undefined) userXMin = state.userXMin;
            if (state.userXMax !== undefined) userXMax = state.userXMax;
            if (state.isUserZoomed !== undefined) isUserZoomed = state.isUserZoomed;
            if (state.hiddenDatasets) {
                hiddenDatasets = state.hiddenDatasets;
            }
        } catch(e) {
            console.error('恢复状态失败', e);
        }
    }
}

var bMin = 0, bMax = 30, hMin = 40, hMax = 120;

// 实时图配置（无图例）
function makeRtOpts(yMin, yMax) {
    return { responsive: true, maintainAspectRatio: false, animation: false, interaction: { intersect: false, mode: 'index' }, 
    elements: { point: { radius: 0 }, line: { borderWidth: 1.8, tension: 0.3 } }, 
    scales: { x: { type: 'linear', grid: { color: '#1a2236', drawBorder: false }, ticks: { color: '#3a4a64', font: { size: 10 }, maxTicksLimit: 8, callback: function(v) { return fmtTs(v); } } }, 
    y: { min: yMin, max: yMax, grid: { color: '#1a2236', drawBorder: false, borderDash: [3,3] }, ticks: { color: '#3a4a64', font: { size: 10 }, maxTicksLimit: 6 } } }, 
    plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1a2236', borderColor: '#2a3a54', borderWidth: 1, titleColor: '#6b7a94', bodyColor: '#c8cee0' }, zoom: false } };
}

// 长期图配置（带图例，支持点击隐藏）
function makeLtOpts(yMin, yMax) {
    return { responsive: true, maintainAspectRatio: false, animation: false, interaction: { intersect: false, mode: 'index' }, 
    elements: { point: { radius: 0 }, line: { borderWidth: 2, tension: 0.0 } }, 
    scales: { x: { type: 'linear', grid: { color: '#1a2236', drawBorder: false }, ticks: { color: '#3a4a64', font: { size: 10 }, maxTicksLimit: 8, callback: function(v) { return fmtTs(v); } } }, 
    y: { min: yMin, max: yMax, grid: { color: '#1a2236', drawBorder: false, borderDash: [3,3] }, ticks: { color: '#3a4a64', font: { size: 10 }, maxTicksLimit: 6 } } }, 
    plugins: { 
        legend: { display: true, position: 'top', align: 'start', 
            labels: { color: '#c8cee0', usePointStyle: true, pointStyle: 'circle', padding: 15, font: { size: 11 } },
            onClick: function(e, legendItem, legend) {
                var chart = legend.chart;
                var index = legendItem.datasetIndex;
                chart.data.datasets[index].hidden = !chart.data.datasets[index].hidden;
                
                var label = chart.data.datasets[index].label;
                if (label) {
                    if (chart === ltB) {
                        hiddenDatasets.breath[label] = chart.data.datasets[index].hidden;
                    } else if (chart === ltH) {
                        hiddenDatasets.heart[label] = chart.data.datasets[index].hidden;
                    }
                    saveState();
                }
                
                chart.update('none');
            }
        }, 
        tooltip: { backgroundColor: '#1a2236', borderColor: '#2a3a54', borderWidth: 1, titleColor: '#6b7a94', bodyColor: '#c8cee0', callbacks: { title: function(items) { return fmtTs(items[0].parsed.x); }, label: function(item) { return item.dataset.label + ': ' + item.parsed.y; } } }, 
        zoom: { 
            zoom: { 
                wheel: { enabled: true }, 
                pinch: { enabled: true }, 
                mode: 'x',
                onZoomComplete: function(ctx) { 
                    isUserZoomed = true;
                    updateSliderFromChart(ctx.chart);
                }
            }, 
            pan: { 
                enabled: true, 
                mode: 'x',
                onPanComplete: function(ctx) {
                    isUserZoomed = true;
                    updateSliderFromChart(ctx.chart);
                }
            } 
        } 
    } };
}

// 初始化图表
var rtB = new Chart(document.getElementById('rtBreath'), { type: 'line', data: { datasets: [{ label: '呼吸率', data: [], borderColor: '#4285F4', backgroundColor: 'rgba(66,133,244,0.08)', fill: true }] }, options: makeRtOpts(bMin, bMax) });
var rtH = new Chart(document.getElementById('rtHeart'), { type: 'line', data: { datasets: [{ label: '心率', data: [], borderColor: '#EA4335', backgroundColor: 'rgba(234,67,53,0.08)', fill: true }] }, options: makeRtOpts(hMin, hMax) });
var ltB = new Chart(document.getElementById('ltBreath'), { type: 'line', data: { datasets: [] }, options: makeLtOpts(bMin, bMax) });
var ltH = new Chart(document.getElementById('ltHeart'), { type: 'line', data: { datasets: [] }, options: makeLtOpts(hMin, hMax) });

// 初始化X轴按钮状态
restoreState();

// 监听缩放和平移事件
ltB.options.onZoom = function() { updateSliderFromChart(ltB); };
ltB.options.onPan = function() { updateSliderFromChart(ltB); };
ltH.options.onZoom = function() { updateSliderFromChart(ltH); };
ltH.options.onPan = function() { updateSliderFromChart(ltH); };

function updateSliderFromChart(chart) {
    var xMin = chart.options.scales.x.min;
    var xMax = chart.options.scales.x.max;
    if (xMin !== undefined && xMax !== undefined) {
        userXMin = xMin;
        userXMax = xMax;
        var range = xMax - xMin;
        savedXRangeSeconds = range;
        isUserZoomed = true;
        document.getElementById('xRangeSlider').value = range;
        document.getElementById('xRangeValue').textContent = Math.round(range);
        saveState();
    }
}

// 双击重置缩放
document.getElementById('ltBreath').addEventListener('dblclick', function() { 
    ltB.resetZoom(); 
    isUserZoomed = false;
    userXMin = null;
    userXMax = null;
    savedXRangeSeconds = 300;
    document.getElementById('xRangeSlider').value = 300;
    document.getElementById('xRangeValue').textContent = 300;
    saveState();
});
document.getElementById('ltHeart').addEventListener('dblclick', function() { 
    ltH.resetZoom(); 
    isUserZoomed = false;
    userXMin = null;
    userXMax = null;
    savedXRangeSeconds = 300;
    document.getElementById('xRangeSlider').value = 300;
    document.getElementById('xRangeValue').textContent = 300;
    saveState();
});

// X轴范围滑块事件
document.getElementById('xRangeSlider').addEventListener('input', function(e) {
    var range = parseFloat(e.target.value);
    setXRange(range);
});

var currentMode = 'stable';
var hiddenDatasets = { breath: {}, heart: {} };
var savedXRangeSeconds = 300;
var userXMin = null;
var userXMax = null;
var isUserZoomed = false;

function setXRange(range) {
    savedXRangeSeconds = range;
    isUserZoomed = false;
    document.getElementById('xRangeValue').textContent = Math.round(range);
    [ltB, ltH].forEach(function(c) {
        if (c.data.datasets.length > 0 && c.data.datasets[0].data && c.data.datasets[0].data.length > 0) {
            var maxX = c.data.datasets[0].data[c.data.datasets[0].data.length - 1].x;
            c.options.scales.x.min = maxX - range;
            c.options.scales.x.max = maxX;
            c.update('none');
        }
    });
    if (ltB.data.datasets.length > 0 && ltB.data.datasets[0].data && ltB.data.datasets[0].data.length > 0) {
        var maxX = ltB.data.datasets[0].data[ltB.data.datasets[0].data.length - 1].x;
        userXMin = maxX - range;
        userXMax = maxX;
    }
    saveState();
}

function setMode(m) {
    currentMode = m;
    ['btnStable','btnUltra','btnSmooth','btnLowfreq','btnRaw'].forEach(function(id) {
        var el = document.getElementById(id); var baseClass = 'mode-btn'; if (id === 'btnStable') baseClass += ' recommended';
        el.className = baseClass + (el.id === 'btn' + m.charAt(0).toUpperCase() + m.slice(1) ? ' active' : '');
    });
    var tag = document.getElementById('modeTag'); tag.className = 'mode-tag ' + m;
    var names = { 'stable': '稳定', 'ultra': '超稳', 'smooth': '平滑', 'lowfreq': '低频', 'raw': '源数据' }; tag.textContent = names[m] || m;
    fetch('/mode?v=' + m);
}

function applyScale() {
    bMin = parseFloat(document.getElementById('bMin').value) || 0; bMax = parseFloat(document.getElementById('bMax').value) || 30;
    hMin = parseFloat(document.getElementById('hMin').value) || 0; hMax = parseFloat(document.getElementById('hMax').value) || 150;
    [rtB, ltB].forEach(function(c) { c.options.scales.y.min = bMin; c.options.scales.y.max = bMax; c.update('none'); });
    [rtH, ltH].forEach(function(c) { c.options.scales.y.min = hMin; c.options.scales.y.max = hMax; c.update('none'); });
}
document.querySelectorAll('.ctrl-group input').forEach(function(el) { el.addEventListener('keydown', function(e) { if (e.key === 'Enter') applyScale(); }); });

var modeColors = { 'stable': '#34A853', 'ultra': '#FF9800', 'smooth': '#4285F4', 'raw': '#EA4335', 'lowfreq': '#9C27B0' };
var modeNames = { 'stable': '稳定(6s)', 'ultra': '超稳(8s)', 'smooth': '平滑', 'raw': '源数据', 'lowfreq': '低频' };

// 实时数据更新
setInterval(function() {
    fetch('/data').then(function(r) { return r.json(); }).then(function(d) {
        document.getElementById('vBreath').textContent = d.breath; document.getElementById('vHeart').textContent = d.heart;
        document.getElementById('vDist').textContent = d.distance;
        var bConf = d.breath_confidence || 0; var hConf = d.heart_confidence || 0;
        document.getElementById('confBreath').style.width = (bConf * 100) + '%'; document.getElementById('confBreath').style.background = bConf > 0.6 ? '#34A853' : (bConf > 0.3 ? '#FBBC05' : '#EA4335');
        document.getElementById('confHeart').style.width = (hConf * 100) + '%'; document.getElementById('confHeart').style.background = hConf > 0.6 ? '#34A853' : (hConf > 0.3 ? '#FBBC05' : '#EA4335');
        var dot = document.getElementById('dotHuman'); var txt = document.getElementById('txtHuman');
        if (d.human) { dot.className = 'status-dot on'; txt.textContent = '有人'; } else { dot.className = 'status-dot off'; txt.textContent = '无人'; }
        var status = d.status || 'normal'; var statusLabels = { 'normal': '正常', 'compensating': '补偿中', 'away': '离座' };
        ['cardBreath', 'cardHeart', 'cardDist', 'cardStatus'].forEach(function(id) { var el = document.getElementById(id); el.className = el.className.replace(/status-\w+/g, ''); el.classList.add('status-' + status); });
        document.getElementById('statusBreath').textContent = statusLabels[status]; document.getElementById('statusHeart').textContent = statusLabels[status];
        document.getElementById('statusText').textContent = status === 'normal' ? '数据正常' : (status === 'away' ? '无人检测' : '置信度低');
        if (d.mode !== currentMode) setMode(d.mode);
        rtB.data.datasets[0].data = toPoints(d.rt.time, d.rt.breath); rtH.data.datasets[0].data = toPoints(d.rt.time, d.rt.heart);
        rtB.update('none'); rtH.update('none');
    });
}, 250);

// 长期对比数据更新（多模式）
setInterval(function() {
    fetch('/longterm').then(function(r) { return r.json(); }).then(function(allModesData) {
        var newBsets = []; var newHsets = []; var totalPts = 0;
        
        for(var mode in allModesData) {
            var mData = allModesData[mode];
            if(!mData.time || mData.time.length === 0) continue;
            
            var color = modeColors[mode] || '#999';
            var label = modeNames[mode] || mode;
            totalPts += mData.time.length;
            
            newBsets.push({
                label: label + ' 呼吸', data: toPoints(mData.time, mData.breath),
                borderColor: color, backgroundColor: 'transparent', pointBackgroundColor: color
            });
            newHsets.push({
                label: label + ' 心率', data: toPoints(mData.time, mData.heart),
                borderColor: color, backgroundColor: 'transparent', pointBackgroundColor: color
            });
        }
        
        ltB.data.datasets.forEach(function(ds, i) { hiddenDatasets.breath[ds.label] = ds.hidden; });
        ltH.data.datasets.forEach(function(ds, i) { hiddenDatasets.heart[ds.label] = ds.hidden; });
        
        newBsets.forEach(function(ds) { 
            if(hiddenDatasets.breath[ds.label] !== undefined) ds.hidden = hiddenDatasets.breath[ds.label]; 
        });
        newHsets.forEach(function(ds) { 
            if(hiddenDatasets.heart[ds.label] !== undefined) ds.hidden = hiddenDatasets.heart[ds.label]; 
        });
        
        ltB.data.datasets = newBsets; ltH.data.datasets = newHsets;
        
        // 应用X轴范围设置 - 关键修复：如果用户缩放/平移过，保持当前视图
        if (newBsets.length > 0 && newBsets[0].data.length > 0) {
            var maxX = newBsets[0].data[newBsets[0].data.length - 1].x;
            if (isUserZoomed && userXMin !== null && userXMax !== null) {
                // 用户已经缩放/平移过，保持当前视图范围，但随时间推移平移
                var oldRange = userXMax - userXMin;
                if (maxX > userXMax) {
                    var shift = maxX - userXMax;
                    ltB.options.scales.x.min = userXMin + shift;
                    ltB.options.scales.x.max = userXMax + shift;
                    ltH.options.scales.x.min = userXMin + shift;
                    ltH.options.scales.x.max = userXMax + shift;
                    userXMin += shift;
                    userXMax += shift;
                    saveState();
                } else {
                    ltB.options.scales.x.min = userXMin;
                    ltB.options.scales.x.max = userXMax;
                    ltH.options.scales.x.min = userXMin;
                    ltH.options.scales.x.max = userXMax;
                }
            } else {
                var range = savedXRangeSeconds;
                ltB.options.scales.x.min = maxX - range;
                ltB.options.scales.x.max = maxX;
                ltH.options.scales.x.min = maxX - range;
                ltH.options.scales.x.max = maxX;
            }
        }
        
        ltB.update('none'); ltH.update('none');
        document.getElementById('pointInfo').textContent = totalPts + ' 点';
    });
}, 3000);
</script>
</body>
</html>
