<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
body{background:#111;color:#fff;text-align:center;margin:0;padding:20px;font-family:system-ui}
button{padding:10px 20px;margin:8px;border:none;border-radius:6px;font-size:15px;cursor:pointer}
#bi{background:#ff7a22;color:#fff}#bl{background:#2299ff;color:#fff}
button:disabled{opacity:.35}
#live{max-width:800px;width:100%;border:3px solid #ff7a22;border-radius:8px;display:block;margin:12px auto 0}
#ed{margin-top:18px;font-size:26px;font-weight:bold;min-height:36px}
#t{position:fixed;top:18px;right:18px;background:#333;color:#fff;padding:12px 20px;border-radius:6px;opacity:0;transition:opacity .25s;font-size:14px;pointer-events:none}
#t.show{opacity:1}
</style>
</head>
<body>
<h2>实时情绪识别</h2>
<div>
<button id="bi" onclick="sw('ip')">IP摄像头</button>
<button id="bl" onclick="sw('local')">本地摄像头</button>
</div>
<img id="live" src="/video_feed" alt="实时视频流" title="实时视频流">
<div id="ed"></div><div id="t"></div>
<script>
var ed=document.getElementById("ed");
var E={neutral:"\u2714",happiness:"\ud83d\ude0a",surprise:"\ud83d\ude2e",sadness:"\ud83d\ude22",anger:"\ud83d\ude20",disgust:"\ud83e\udd22",fear:"\ud83d\ude28",contempt:"\ud83d\ude36"};
var Z={neutral:"平静",happiness:"高兴",surprise:"惊讶",sadness:"悲伤",anger:"愤怒",disgust:"厌恶",fear:"恐惧",contempt:"轻蔑"};
setInterval(function(){fetch("/get_emotion").then(function(r){return r.json()}).then(function(d){
if(d.emotion&&d.emotion!=="未初始化"){var p=(d.confidence*100).toFixed(0);
ed.innerHTML=(E[d.emotion]||"")+" "+(Z[d.emotion]||d.emotion)+' <span style="color:#aaa;font-size:18px">('+p+"%)</span>"}
}).catch(function(){})},300);
function sw(c){document.querySelectorAll("button").forEach(function(b){b.disabled=true});toast("切换中...");
fetch("/switch_camera",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({cam:c})})
.then(function(r){return r.json()}).then(function(d){toast(d.code===200?"OK":"失败")})
.catch(function(){toast("网络错误")}).finally(function(){document.querySelectorAll("button").forEach(function(b){b.disabled=false})})}
function toast(m){var t=document.getElementById("t");t.textContent=m;t.classList.add("show");
clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show")},2500)}
</script>
</body>
</html>
