<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>人脸分析</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #050a12; color: #c8d6e5; font-family: 'Inter', 'SF Mono', 'Consolas', monospace; overflow: hidden; }
.container { display: flex; width: 100%; height: 100%; padding: 8px; gap: 8px; }

.left-panel { width: 28%; background: #080e1a; border: 1px solid #13203a; border-radius: 8px; display: flex; flex-direction: column; padding: 8px; gap: 8px; }
.right-panel { width: 72%; background: #050a12; display: flex; flex-direction: column; padding: 8px; gap: 8px; }

.video-container { background: #050a12; border: 1px solid #13203a; border-radius: 6px; overflow: hidden; aspect-ratio: 16/9; }
.video-container img { width: 100%; height: 100%; object-fit: contain; }

.card-row { display: flex; gap: 6px; }
.card { background: #0b1322; border: 1px solid #13203a; border-radius: 6px; padding: 8px; display: flex; flex-direction: column; }
.card-title { font-size: 9px; color: #4a6a8a; margin-bottom: 4px; }
.card-value { font-size: 20px; font-weight: 700; }
.card-unit { font-size: 10px; color: #3a5570; }
.card.sub { font-size: 11px; color: #6b7280; margin-top: 4px; }

.card.gender .card-value { color: #00e5ff; }
.card.age .card-value { color: #f97316; }
.card.user .card-value { color: #a855f7; }
.card.pose .card-value { color: #14b8a6; }
.card.status .card-value { color: #64ffda; }

.bar-container { width: 100%; background: #050a12; border-radius: 4px; margin-top: 6px; height: 8px; overflow: hidden; }
.bar { height: 100%; transition: width 0.3s ease; border-radius: 4px; }
.bar.age { background: #f97316; }
.bar.gender { background: #00e5ff; }
.bar.user { background: #a855f7; }

.pose-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 6px; }
.pose-item { background: #050a12; padding: 4px; border-radius: 4px; text-align: center; }
.pose-label { color: #4a6a8a; font-size: 8px; }
.pose-value { font-weight: 600; font-size: 11px; color: #c8d6e5; }

.score-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; margin-top: 6px; }
.score-item { background: #050a12; padding: 4px; border-radius: 4px; text-align: center; font-size: 10px; }
.score-label { color: #4a6a8a; margin-bottom: 2px; font-size: 8px; }
.score-value { font-weight: 600; color: #c8d6e5; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; margin-top: 4px; }
.badge-front { background: rgba(52,211,153,0.15); color: #34d399; }
.badge-new { background: rgba(251,191,36,0.15); color: #fbbf24; }
.badge-existing { background: rgba(52,211,153,0.15); color: #34d399; }

.btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; transition: all 0.2s ease; }
.btn-secondary { background: #13203a; color: #c8d6e5; border: 1px solid #264063; }
.btn-secondary:hover { background: #1a2d4a; }
.btn.active { background: #64ffda; color: #050a12; border-color: #64ffda; }
</style>
</head>
<body>
<div class="container">
    <div class="left-panel">
        <div class="card-row">
            <div class="card status" id="status-card">
                <div class="card-title">服务器状态</div>
                <div class="card-value" id="server-status">--</div>
                <div class="card-unit" id="update-time">--</div>
            </div>
            <div class="card">
                <div class="card-title">摄像头</div>
                <div class="card-row" style="gap: 4px; margin-top: 4px;">
                    <button class="btn btn-secondary" id="btn-ip-cam" onclick="switchCamera('ip')">IP</button>
                    <button class="btn btn-secondary active" id="btn-local-cam" onclick="switchCamera('local')">本地</button>
                </div>
            </div>
        </div>
        
        <div class="video-container">
            <img src="/video_feed" alt="视频流">
        </div>
        
        <div class="card-row">
            <div class="card" id="face-card">
                <div class="card-title">人脸检测</div>
                <div class="card-value" id="face-count">--</div>
                <div class="card-unit" id="face-status">--</div>
            </div>
            <div class="card user-status" id="user-status-card">
                <div class="card-title">用户状态</div>
                <div class="card-value" id="user-status-text">--</div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="card-row">
            <div class="card user" style="flex: 1.5;">
                <div class="card-title">用户识别</div>
                <div class="card-value" id="user-name">--</div>
                <div class="card.sub">ID: <span id="user-id">--</span> | 置信度: <span id="user-confidence">--</span>%</div>
                <div class="bar-container">
                    <div class="bar user" id="user-bar" style="width: 0%"></div>
                </div>
            </div>
            <div class="card age" style="flex: 1;">
                <div class="card-title">年龄范围</div>
                <div class="card-value" id="age-range">--</div>
                <div class="card.sub">置信度: <span id="age-confidence">--</span>%</div>
                <div class="bar-container">
                    <div class="bar age" id="age-bar" style="width: 0%"></div>
                </div>
            </div>
            <div class="card gender" style="flex: 1;">
                <div class="card-title">性别</div>
                <div class="card-value" id="gender-value">--</div>
                <div class="card.sub">置信度: <span id="gender-confidence">--</span>%</div>
                <div class="bar-container">
                    <div class="bar gender" id="gender-bar" style="width: 0%"></div>
                </div>
                <div class="score-grid">
                    <div class="score-item">
                        <div class="score-label">男</div>
                        <div class="score-value" id="male-score">--</div>
                    </div>
                    <div class="score-item">
                        <div class="score-label">女</div>
                        <div class="score-value" id="female-score">--</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card-row">
            <div class="card pose" style="flex: 2;">
                <div class="card-title">头部姿态</div>
                <div class="card-value" id="pose-text">--</div>
                <div class="card.sub">
                    <span id="front-status" style="display: none;">
                        <span class="badge badge-front">正脸 ✓</span>
                    </span>
                </div>
                <div class="pose-grid">
                    <div class="pose-item">
                        <div class="pose-label">俯仰</div>
                        <div class="pose-value" id="pitch-value">--°</div>
                    </div>
                    <div class="pose-item">
                        <div class="pose-label">偏航</div>
                        <div class="pose-value" id="yaw-value">--°</div>
                    </div>
                    <div class="pose-item">
                        <div class="pose-label">翻滚</div>
                        <div class="pose-value" id="roll-value">--°</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let currentCamera = 'local';

function getPoseBadge(pose) {
    switch(pose) {
        case 'front': return '正脸';
        case 'side_left': return '左偏';
        case 'side_right': return '右偏';
        case 'up': return '抬头';
        case 'down': return '低头';
        default: return pose;
    }
}

function switchCamera(cameraType) {
    currentCamera = cameraType;
    document.getElementById('btn-ip-cam').classList.toggle('active', cameraType === 'ip');
    document.getElementById('btn-local-cam').classList.toggle('active', cameraType === 'local');
    fetch('/api/switch_camera', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ camera: cameraType })
    })
    .then(r => r.json())
    .then(() => {
        const img = document.querySelector('.video-container img');
        img.src = '/video_feed?t=' + Date.now();
    })
    .catch(() => {});
}

function update() {
    fetch('/api/data')
        .then(r => r.json())
        .then(data => {
            document.getElementById('server-status').textContent = '在线';
            document.getElementById('server-status').style.color = '#64ffda';
            document.getElementById('update-time').textContent = new Date().toLocaleTimeString();
            
            document.getElementById('user-name').textContent = data.user_name || '--';
            document.getElementById('user-id').textContent = data.user_id || '--';
            document.getElementById('user-confidence').textContent = (data.user_confidence * 100).toFixed(1);
            document.getElementById('user-bar').style.width = (data.user_confidence * 100) + '%';
            
            const userStatusCard = document.getElementById('user-status-card');
            const userStatusText = document.getElementById('user-status-text');
            if (data.face_detected) {
                if (data.is_new_user) {
                    userStatusText.textContent = '✨ 新用户';
                    userStatusText.style.color = '#fbbf24';
                } else {
                    userStatusText.textContent = '✓ 用户已存在';
                    userStatusText.style.color = '#34d399';
                }
            } else {
                userStatusText.textContent = '等待人脸';
                userStatusText.style.color = '#6b7280';
            }
            
            const poseText = getPoseBadge(data.pose);
            document.getElementById('pose-text').textContent = poseText;
            document.getElementById('pitch-value').textContent = data.pitch.toFixed(1) + '°';
            document.getElementById('yaw-value').textContent = data.yaw.toFixed(1) + '°';
            document.getElementById('roll-value').textContent = data.roll.toFixed(1) + '°';
            
            const frontStatus = document.getElementById('front-status');
            if (data.is_front_face) frontStatus.style.display = 'inline';
            else frontStatus.style.display = 'none';
            
            document.getElementById('gender-value').textContent = data.gender;
            document.getElementById('gender-confidence').textContent = (data.gender_confidence * 100).toFixed(1);
            document.getElementById('age-range').textContent = data.age_range;
            document.getElementById('age-confidence').textContent = (data.age_confidence * 100).toFixed(1);
            document.getElementById('face-count').textContent = data.face_count;
            
            document.getElementById('gender-bar').style.width = (data.gender_confidence * 100) + '%';
            document.getElementById('age-bar').style.width = (data.age_confidence * 100) + '%';
            
            if (data.gender_model && data.gender_model.available && data.gender_model.scores) {
                document.getElementById('male-score').textContent = (data.gender_model.scores[0] * 100).toFixed(1) + '%';
                document.getElementById('female-score').textContent = (data.gender_model.scores[1] * 100).toFixed(1) + '%';
            }
            
            const faceCard = document.getElementById('face-card');
            const faceStatus = document.getElementById('face-status');
            if (data.face_detected) {
                faceStatus.textContent = '已检测';
                faceStatus.style.color = '#34d399';
                faceCard.style.borderColor = '#10b981';
            } else {
                faceStatus.textContent = '未检测';
                faceStatus.style.color = '#ef4444';
                faceCard.style.borderColor = '#ef4444';
            }
        })
        .catch(() => {
            document.getElementById('server-status').textContent = '连接失败';
            document.getElementById('server-status').style.color = '#ef4444';
        });
}

update();
setInterval(update, 1000);
</script>
</body>
</html>
