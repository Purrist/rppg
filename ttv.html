                { title: "贾玲小品精选集", cover: "https://img3.baidu.com/it/u=4445556667,4445556667&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=700", url: "https://v.qq.com/x/page/l1234567890.html", platform: "腾讯视频" }
            ]
        };

        // 当前显示的视频列表
        let currentVideos = [...popularVideos];
        let currentPage = 1;
        const videosPerPage = 10;

        // 生成视频卡片
        function renderVideos(videos, clear = true) {
            const videoGrid = document.getElementById('videoGrid');
            
            if (clear) {
                videoGrid.innerHTML = '';
            }

            videos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl overflow-hidden shadow-md card-hover cursor-pointer';
                card.onclick = () => window.open(video.url, '_blank');
                
                card.innerHTML = `
                    <div class="relative">
                        <img src="${video.cover}" alt="${video.title}" class="w-full h-64 object-cover">
                        <span class="absolute bottom-2 right-2 bg-black/70 text-white px-2 py-1 rounded text-sm">
                            ${video.platform}
                        </span>
                    </div>
                    <div class="p-4">
                        <h3 class="text-normal text-text line-clamp-2">${video.title}</h3>
                    </div>
                `;
                
                videoGrid.appendChild(card);
            });
        }

        // 初始化页面
        function init() {
            renderVideos(popularVideos);

            // 分类按钮点击事件
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const category = btn.dataset.category;
                    document.getElementById('sectionTitle').textContent = `📺 ${category}`;
                    currentVideos = [...categoryVideos[category]];
                    currentPage = 1;
                    renderVideos(currentVideos.slice(0, videosPerPage));
                    
                    // 滚动到视频区域
                    document.getElementById('videoGrid').scrollIntoView({ behavior: 'smooth' });
                });
            });

            // 搜索功能
            document.getElementById('searchBtn').addEventListener('click', performSearch);
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });

            // 加载更多
            document.getElementById('loadMoreBtn').addEventListener('click', () => {
                currentPage++;
                const start = (currentPage - 1) * videosPerPage;
                const end = start + videosPerPage;
                renderVideos(currentVideos.slice(start, end), false);
            });

            // 返回顶部
            window.addEventListener('scroll', () => {
                const backToTop = document.getElementById('backToTop');
                if (window.scrollY > 300) {
                    backToTop.classList.remove('opacity-0', 'invisible');
                } else {
                    backToTop.classList.add('opacity-0', 'invisible');
                }
            });

            document.getElementById('backToTop').addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        // 执行搜索
        function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            document.getElementById('sectionTitle').textContent = `🔍 搜索结果: ${query}`;
            
            // 简单的本地搜索（实际项目中可以对接必应视频搜索API）
            const searchResults = [];
            const allVideos = [...popularVideos];
            Object.values(categoryVideos).forEach(videos => allVideos.push(...videos));
            
            allVideos.forEach(video => {
                if (video.title.toLowerCase().includes(query.toLowerCase())) {
                    searchResults.push(video);
                }
            });

            currentVideos = searchResults.length > 0 ? searchResults : [];
            currentPage = 1;
            renderVideos(currentVideos.slice(0, videosPerPage));
            
            // 滚动到视频区域
            document.getElementById('videoGrid').scrollIntoView({ behavior: 'smooth' });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
